<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이룸덴탈랩 포털 v5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --blue:#2563eb;--blue-d:#1d4ed8;--blue-l:#eff6ff;--blue-m:#dbeafe;
  --green:#16a34a;--green-l:#f0fdf4;--green-m:#dcfce7;
  --yellow:#d97706;--yellow-l:#fffbeb;--yellow-m:#fef3c7;
  --red:#dc2626;--red-l:#fef2f2;--red-m:#fee2e2;
  --purple:#7c3aed;--purple-l:#f5f3ff;--purple-m:#ede9fe;
  --sky:#0ea5e9;--sky-l:#f0f9ff;--sky-m:#e0f2fe;
  --teal:#0d9488;--teal-l:#f0fdfa;
  --orange:#ea580c;--orange-l:#fff7ed;
  --navy:#0f172a;--navy2:#1e293b;
  --slate:#64748b;--slate-l:#f8fafc;
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;--surface3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;--text4:#cbd5e1;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.1);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,0.1),0 8px 10px -6px rgba(0,0,0,0.1);
  --shadow-xl:0 25px 50px -12px rgba(0,0,0,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
.flex{display:flex;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.gap-1{gap:4px;}.gap-2{gap:8px;}.gap-3{gap:12px;}.gap-4{gap:16px;}.gap-6{gap:24px;}
.hidden{display:none!important;}.text-center{text-align:center;}
.font-mono{font-family:'DM Mono',monospace;}
.w-full{width:100%;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;}

/* ── BUTTON ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;min-height:40px;cursor:pointer;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:var(--blue-d);box-shadow:0 4px 12px rgba(37,99,235,.3);}
.btn-success{background:var(--green);color:#fff;}.btn-success:hover{background:#15803d;}
.btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border);}.btn-secondary:hover{background:var(--surface2);border-color:var(--border2);}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid #fca5a5;}.btn-danger:hover{background:var(--red-m);}
.btn-ghost{background:transparent;border:none;color:var(--text3);}.btn-ghost:hover{color:var(--text);background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;min-height:32px;}
.btn-xs{padding:3px 8px;font-size:11px;min-height:26px;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius-sm);}

/* ── INPUT ── */
.input,.select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface);transition:all .15s;color:var(--text);}
.input:focus,.select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.input::placeholder{color:var(--text3);}
.input.error{border-color:var(--red);}
.error-msg{color:var(--red);font-size:12px;margin-top:4px;display:none;}
.error-msg.show{display:block;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}
.card-body{padding:20px;}
.card-sm .card-body{padding:16px;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
.table{width:100%;border-collapse:collapse;}
.table th{background:var(--surface2);padding:12px 14px;font-size:12px;font-weight:700;color:var(--text2);text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:1;}
.table td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.table tbody tr:hover td{background:var(--surface2);}
.table tbody tr.selected td{background:var(--blue-l);}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1.5px solid;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;}
.badge-working{background:var(--yellow-l);border-color:#fde68a;color:#92400e;}.badge-working::before{background:#f59e0b;}
.badge-design{background:var(--purple-l);border-color:#c4b5fd;color:#5b21b6;}.badge-design::before{background:var(--purple);}
.badge-making{background:var(--orange-l);border-color:#fed7aa;color:#9a3412;}.badge-making::before{background:var(--orange);}
.badge-ship{background:var(--sky-l);border-color:#7dd3fc;color:#0369a1;}.badge-ship::before{background:var(--sky);}
.badge-done{background:var(--green-l);border-color:#86efac;color:#166534;}.badge-done::before{background:var(--green);}
.badge-remake{background:var(--red-l);border-color:#fca5a5;color:#991b1b;}.badge-remake::before{background:var(--red);}
.badge-profit{background:var(--green-l);border-color:#86efac;color:#166534;}
.badge-loss{background:var(--red-l);border-color:#fca5a5;color:#991b1b;}
.badge-breakeven{background:var(--yellow-l);border-color:#fde68a;color:#92400e;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-xl);width:100%;max-width:520px;max-height:90vh;overflow:hidden;transform:translateY(20px) scale(.96);transition:all .25s cubic-bezier(.4,0,.2,1);}
.modal-lg{max-width:700px;}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.modal-body{padding:24px;max-height:65vh;overflow-y:auto;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);font-size:13px;font-weight:600;animation:toastIn .3s ease;min-width:280px;max-width:380px;color:#fff;}
.toast-success{background:#16a34a;}
.toast-error{background:#dc2626;}
.toast-info{background:#2563eb;}
.toast-warn{background:#d97706;}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(40px);}}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:2000;overflow:hidden;}
.login-particles{position:absolute;inset:0;pointer-events:none;}
.particle{position:absolute;font-size:22px;opacity:.07;animation:particleFloat 18s infinite ease-in-out;}
@keyframes particleFloat{0%,100%{transform:translate(0,0) rotate(0deg);}25%{transform:translate(20px,-20px) rotate(90deg);}50%{transform:translate(-10px,-40px) rotate(180deg);}75%{transform:translate(-20px,-10px) rotate(270deg);}}
.login-box{background:#fff;border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-xl);text-align:center;position:relative;animation:slideUp .5s ease-out;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.login-brand{width:88px;height:88px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 30px rgba(37,99,235,.35);font-size:38px;}
.login-title{font-size:24px;font-weight:800;margin-bottom:4px;color:var(--navy);}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;font-weight:500;}
.login-form{text-align:left;}
.login-input-wrap{position:relative;}
.login-input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3);z-index:1;}
.login-input-wrap input{width:100%;padding:13px 14px 13px 44px;border:2px solid var(--border);border-radius:12px;font-size:14px;transition:all .2s;}
.login-input-wrap input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.1);}
.login-error{background:var(--red-l);color:var(--red);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;border:1px solid #fca5a5;animation:shake .4s ease;}
.login-error.show{display:block;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;position:relative;overflow:hidden;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(37,99,235,.4);}
.login-btn.loading{pointer-events:none;}
.login-btn.loading span{opacity:0;}
.login-btn.loading::after{content:'';position:absolute;width:20px;height:20px;border:2px solid transparent;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;left:50%;top:50%;transform:translate(-50%,-50%);}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.login-demo{display:none;}
.demo-btn{padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);font-size:12px;cursor:pointer;transition:all .15s;text-align:center;}
.demo-btn:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue);}
.demo-btn .role{font-size:11px;color:var(--text3);display:block;margin-top:2px;}
.login-footer{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,.35);font-size:12px;}

/* ── LAYOUT ── */
.app{min-height:100vh;display:none;}
.app.logged-in{display:flex;}
.sidebar{width:240px;background:var(--navy);flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s;}
.sidebar-logo{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px;}
.logo-title{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.3px;}
.logo-sub{color:rgba(255,255,255,.35);font-size:10px;margin-top:2px;letter-spacing:.3px;}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-section{padding:14px 16px 6px;font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1.2px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;border-right:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);}
.nav-item.active{background:rgba(37,99,235,.25);color:#93b4ff;border-right-color:var(--blue);}
.nav-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.nav-item .new-badge{margin-left:auto;background:rgba(37,99,235,.5);color:#93b4ff;font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700;}
.nav-item.admin-only{/* admin items styled differently if needed */}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.user-avatar{width:32px;height:32px;border-radius:8px;background:rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:#fff;line-height:1.2;}
.user-role{font-size:11px;color:rgba(255,255,255,.4);}
.logout-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:none;background:rgba(239,68,68,.15);color:#fca5a5;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.logout-btn:hover{background:rgba(239,68,68,.25);color:#fff;}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:16px;}
.topbar-title{font-size:17px;font-weight:700;flex-shrink:0;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-badge{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;}
.badge-admin{background:var(--yellow-l);color:var(--yellow);}
.badge-clinic{background:var(--blue-l);color:var(--blue);}
.content{padding:24px 28px;flex:1;}

/* ── STATS HERO ── */
.stat-hero{display:grid;gap:14px;margin-bottom:20px;}
.stat-hero-4{grid-template-columns:repeat(4,1fr);}
.stat-hero-5{grid-template-columns:repeat(5,1fr);}
.stat-card{border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1.5px solid;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card-icon{font-size:22px;margin-bottom:8px;}
.stat-card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7;}
.stat-card-value{font-size:26px;font-weight:800;line-height:1.1;margin-top:2px;}
.stat-card-sub{font-size:11px;margin-top:4px;opacity:.6;}
.stat-c-yellow{background:var(--yellow-l);border-color:#fde68a;color:#92400e;}
.stat-c-purple{background:var(--purple-l);border-color:#c4b5fd;color:#5b21b6;}
.stat-c-orange{background:var(--orange-l);border-color:#fed7aa;color:#9a3412;}
.stat-c-blue{background:var(--sky-l);border-color:#7dd3fc;color:#0369a1;}
.stat-c-green{background:var(--green-l);border-color:#86efac;color:#166534;}
.stat-c-red{background:var(--red-l);border-color:#fca5a5;color:#991b1b;}
.stat-c-navy{background:var(--blue-l);border-color:#bfdbfe;color:#1e40af;}
.stat-c-teal{background:var(--teal-l);border-color:#99f6e4;color:#0f766e;}

/* ── PROGRESS BAR ── */
.progress-wrap{background:var(--surface2);border-radius:999px;overflow:hidden;height:10px;}
.progress-bar{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.progress-green{background:linear-gradient(90deg,#22c55e,#16a34a);}
.progress-yellow{background:linear-gradient(90deg,#fbbf24,#d97706);}
.progress-red{background:linear-gradient(90deg,#f87171,#dc2626);}
.progress-blue{background:linear-gradient(90deg,#60a5fa,#2563eb);}
.progress-lg{height:14px;}
.progress-xl{height:18px;}

/* ── BEP SECTION ── */
.bep-card{border-radius:var(--radius);overflow:hidden;}
.bep-header{padding:18px 22px;background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;}
.bep-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.bep-subtitle{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;}
.bep-progress-section{padding:20px 22px;background:var(--surface);border-bottom:1px solid var(--border);}
.bep-rate{font-size:42px;font-weight:800;line-height:1;}
.bep-rate.loss{color:var(--red);}
.bep-rate.warn{color:var(--yellow);}
.bep-rate.profit{color:var(--green);}
.bep-progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-top:6px;margin-bottom:4px;}
.bep-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.bep-metric{background:var(--surface);padding:14px 16px;}
.bep-metric-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.bep-metric-value{font-size:16px;font-weight:800;font-family:'DM Mono',monospace;}
.bep-metric-value.negative{color:var(--red);}
.bep-metric-value.positive{color:var(--green);}
.bep-alert{display:flex;align-items:center;gap:10px;padding:12px 22px;font-size:13px;font-weight:600;}
.bep-alert.loss{background:var(--red-l);color:var(--red);border-top:1px solid #fca5a5;}
.bep-alert.profit{background:var(--green-l);color:var(--green);border-top:1px solid #86efac;}
.bep-alert.warn{background:var(--yellow-l);color:var(--yellow);border-top:1px solid #fde68a;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-search{flex:1;min-width:200px;position:relative;}
.filter-search .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;}
.filter-search input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);}
.filter-search input:focus{outline:none;border-color:var(--blue);}
.filter-select{padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);cursor:pointer;min-height:40px;}
.filter-select:focus{outline:none;border-color:var(--blue);}

/* ── QUICK FILTERS ── */
.quick-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.qf-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.qf-btn:hover{border-color:var(--blue);color:var(--blue);}
.qf-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.qf-btn .cnt{font-size:10px;padding:1px 5px;border-radius:6px;background:rgba(0,0,0,.08);}
.qf-btn.active .cnt{background:rgba(255,255,255,.25);}

/* ── DETAIL PANEL ── */
.detail-panel{position:fixed;top:0;right:-520px;width:500px;bottom:0;background:var(--surface);box-shadow:var(--shadow-xl);z-index:200;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.detail-panel.open{right:0;}
.detail-panel-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.detail-panel-body{flex:1;overflow-y:auto;padding:20px 22px;}
.detail-panel-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}

.timeline-item{display:flex;gap:12px;padding-bottom:16px;position:relative;}

//  SUPABASE + LOCAL STORAGE (데이터 영구 저장)
// ══════════════════════════════════════════════════

const STORAGE_KEY = 'dental_portal_v5';
const SUPABASE_URL = 'https://cslygetvchxklyswqvrk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_et1E3k32ILwA3rv35Re2Lw_oxgYWonu';

// Supabase client (lazy load)
let supabaseClient = null;
async function getSupabase() {
  if (!supabaseClient) {
    try {
      // Supabase SDK v2 UMD: window.supabase.createClient
      const opts = {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false
        },
        global: {
          headers: {
            'X-Client-Info': 'dental-portal-v5'
          }
        }
      };
      if (window.supabase && typeof window.supabase.createClient === 'function') {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, opts);
      } else if (typeof window.createClient === 'function') {
        supabaseClient = window.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, opts);
      } else {
        console.warn('Supabase SDK 로드 안됨');
        supabaseClient = null;
      }
    } catch(e) {
      console.warn('Supabase 클라이언트 생성 실패:', e.message);
      supabaseClient = null;
    }
  }
  return supabaseClient;
}

// Supabase에서 데이터 로드
async function loadFromSupabase(table) {
  try {
    const sb = await getSupabase();
    if (!sb) throw new Error('Supabase 미연동');
    const { data, error } = await sb.from(table).select('*');
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.warn(`Supabase ${table} 로드 실패, localStorage 사용:`, e.message);
    return null;
  }
}

// Supabase에 데이터 저장 (upsert)
async function saveToSupabase(table, data) {
  try {
    const sb = await getSupabase();
    if (!sb) throw new Error('Supabase 미연동');
    // 배열 데이터는 개별 upsert
    if (Array.isArray(data)) {
      for (const item of data) {
        const { error } = await sb.from(table).upsert(item, { onConflict: 'id' });
        if (error) throw error;
      }
    } else {
      const { error } = await sb.from(table).upsert(data, { onConflict: 'id' });

      if (error) throw error;
    }
    return true;
  } catch (e) {
    console.warn(`Supabase ${table} 저장 실패:`, e.message);
    // RLS 오류 감지
    if (e.message && e.message.includes('row-level security')) {
      showToast('Supabase 권한 오류 (RLS) - localStorage에 저장됨', 'warn');
    }
    return false;
  }
}

// Supabase 연결 상태 확인
async function checkSupabaseConnection() {
  // SDK 로드 대기 (최대 5초)
  let waited = 0;
  while (!window.supabase?.createClient && !window.createClient && waited < 5000) {
    await new Promise(r => setTimeout(r, 200));
    waited += 200;
  }
  if (!window.supabase?.createClient && !window.createClient) {
    console.warn('⚠️ Supabase SDK 로드 실패 - localStorage 모드');
    return false;
  }
  try {
    const sb = await getSupabase();
    if (!sb) {
      console.warn('⚠️ Supabase 클라이언트 생성 실패');
      return false;
    }
    const { data, error } = await sb.from('clinics').select('id').limit(1);
    if (error) {
      console.warn('⚠️ Supabase 오류:', error.code, error.message);
      showToast('Supabase 오류: ' + error.message, 'warn');
      return false;
    }
    return true;
  } catch (e) {
    console.warn('⚠️ Supabase 연결 실패:', e.message);
    return false;
  }
}

// ── LOCAL STORAGE (오프라인 fallback) ──
function loadFromLocal(key, defaultValue) {
  try {
    const data = localStorage.getItem(STORAGE_KEY + '_' + key);
    return data ? JSON.parse(data) : defaultValue;
  } catch (e) {
    console.error('localStorage 읽기 오류:', e);
    return defaultValue;
  }
}

function saveToLocal(key, value) {
  try {
    localStorage.setItem(STORAGE_KEY + '_' + key, JSON.stringify(value));
  } catch (e) {
    console.error('localStorage 저장 오류:', e);
  }
}

async function initData() {

      console.warn('⚠️ Supabase 연결 실패, localStorage 사용');

  }
}

// 데이터 변경 시 저장 (Supabase 우선, localStorage fallback)
async function autoSave(tableName, data) {
  // Supabase에 먼저 저장 시도
  if (isSupabaseConnected) {
    const saved = await saveToSupabase(tableName, data);
    if (saved) {
      console.log(`✅ Supabase ${tableName} 저장 완료`);
      return true;
    }
    // Supabase 실패 시 localStorage에 저장
    saveToLocal(tableName, data);
    showToast('Supabase 저장 실패, 로컬에 임시 저장됨', 'warn');
    return false;
  }
  
  // Supabase 연결 안 되면 localStorage에 저장
  saveToLocal(tableName, data);
  return true;
}

// 전체 데이터 저장 (모든 테이블)
async function syncAllData() {

    autoSave('users', USERS),

    autoSave('products', PRODUCTS),
    autoSave('fixed_costs', FIXED_COSTS),

function generateCases(){
  const statuses=['working','design','making','ship','done','done','done','done'];
  const types=['싱글','브릿지','파샬','풀마우스'];
  const teeth=['11','12','13','14','15','16','17','21','22','24','25','26','36','37','46','47'];
  const cases=[];
  const now=new Date();
  for(let i=1;i<=60;i++){
    const clinic=CLINICS[Math.floor(Math.random()*CLINICS.length)];
    const product=PRODUCTS[Math.floor(Math.random()*PRODUCTS.length)];
    const status=statuses[Math.floor(Math.random()*statuses.length)];
    const daysAgo=Math.floor(Math.random()*30);
    const recv=new Date(now);recv.setDate(recv.getDate()-daysAgo);
    const ship=new Date(recv);ship.setDate(ship.getDate()+Math.floor(Math.random()*5+2));
    const drRate=clinic.discount_rate;  // 예: -10 (%)
    const base=product.selling_price;
    const final=Math.round(base * (1 + drRate / 100));  // -10% → 0.9배
    const toothNum = teeth[Math.floor(Math.random()*teeth.length)];
    cases.push({
      id:`case${String(i).padStart(3,'0')}`,
      case_number:`ERD-2026-${String(i).padStart(4,'0')}`,
      clinic_id:clinic.id,clinic_name:clinic.name,
      patient_name:`환자${i}`,
      tooth_number:toothNum,tooth_numbers:[toothNum],tooth_count:1,
      product_id:product.id,product_name:product.name,
      type:types[Math.floor(Math.random()*types.length)],
      price:product.selling_price,
      discount_rate:clinic.discount_rate,
      final_price:final,
      status,is_remake:Math.random()<.08,
      receive_date:recv.toISOString().slice(0,10),
      ship_date:ship.toISOString().slice(0,10),
      memo:Math.random()<.3?'빠른 작업 요청':'',
      history:[{status:'working',changed_at:recv.toISOString(),changed_by:'관리자'}],
      created_at:recv.toISOString(),
    });

  }
  return cases;
}

function generateProductionLog(){
  const log=[];
  const now=new Date();
  CASES.filter(c=>c.status==='done').forEach((c,i)=>{
    const d=new Date(c.receive_date);d.setDate(d.getDate()+2);
    log.push({
      id:`pl${String(i+1).padStart(3,'0')}`,
      case_id:c.id,product_id:c.product_id,product_name:c.product_name,
      clinic_id:c.clinic_id,clinic_name:c.clinic_name,
      quantity:1,selling_price:c.price,material_cost:PRODUCTS.find(p=>p.id===c.product_id)?.material_cost||0,
      final_price:c.final_price,production_date:d.toISOString().slice(0,10),
    });

  });

  return log;
}

const MAX_ATTEMPTS=5;
const SESSION_DURATION_MS = 24 * 60 * 60 * 1000; // 24시간
let isDataReady = false;

// 세션 관리: 저장/확인/만료
function saveSession(user) {
  const sessionData = {
    user: user,
    timestamp: Date.now()
  };
  localStorage.setItem('dental_session', JSON.stringify(sessionData));
}

function checkSession() {
  try {
    const sessionStr = localStorage.getItem('dental_session');
    if (!sessionStr) return null;
    
    const session = JSON.parse(sessionStr);
    const elapsed = Date.now() - session.timestamp;
    
    // 세션 만료 확인
    if (elapsed > SESSION_DURATION_MS) {
      localStorage.removeItem('dental_session');
      return null;
    }
    return session.user;
  } catch (e) {
    return null;
  }
}

function clearSession() {
  localStorage.removeItem('dental_session');
}

// quickLogin 제거됨 (보안)

async function doLogin(){
  if (!isDataReady) {showLoginError('데이터 로딩 중... 잠시 후 시도하세요.');return;}
  if(loginAttempts>=MAX_ATTEMPTS){showLoginError('5회 이상 실패. 잠시 후 다시 시도해주세요.');return;}
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  const btn=document.getElementById('loginBtn');
  if(!id||!pw){showLoginError('아이디와 비밀번호를 입력하세요.');return;}
  btn.classList.add('loading');
  
  // 사용자 찾기
  const user = USERS.find(u => u.username === id);
  if (!user) {
    btn.classList.remove('loading');
    loginAttempts++;
    const remain = MAX_ATTEMPTS - loginAttempts;
    showLoginError(`아이디 또는 비밀번호가 올바르지 않습니다. (${remain}회 남음)`);
    return;
  }
  
  // 비밀번호 검증 (해시 비교 또는 일반 비교)
  let isValid = false;
  if (user.password_hash) {
    isValid = await verifyPassword(pw, user.password_hash);
  } else {
    // 기존 일반 비밀번호 (하위 호환)
    isValid = (user.password === pw);
  }
  
  btn.classList.remove('loading');
  if (isValid) {
    loginAttempts = 0;
    localStorage.removeItem('_login_attempts');
    localStorage.removeItem('_login_locktime');
    currentUser = {...user};
    // 비밀번호 관련 필드 모두 제거
    delete currentUser.password;
    delete currentUser.password_hash;
    // 세션 저장 안 함 — 브라우저 닫으면 무조건 재로그인
    initApp();
  } else {
    loginAttempts++;
    localStorage.setItem('_login_attempts', loginAttempts);
    if(loginAttempts >= MAX_ATTEMPTS) localStorage.setItem('_login_locktime', Date.now());
    const remain = MAX_ATTEMPTS - loginAttempts;
    showLoginError(`아이디 또는 비밀번호가 올바르지 않습니다. (${remain}회 남음)`);
  }
}

}

// 비밀번호 해시화 (SHA-256 via Web Crypto API)
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + 'dental_salt_2026');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// 비밀번호 검증
async function verifyPassword(password, hashedPassword) {
  const hash = await hashPassword(password);
  return hash === hashedPassword;
}

// XSS 방지: HTML 이스케이프 함수
function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// 숫자만 추출 (입력 검증용)
function parseNumber(str) {
  const n = parseInt(String(str).replace(/[^0-9-]/g, ''), 10);
  return isNaN(n) ? 0 : n;
}

function setDashFilter(f){
  dashFilter=f;dashPage=1;
  document.querySelectorAll('.qf-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.qf===f||(f==='all'&&b.dataset.qf==='all'));
  });

  renderCaseTable();
}

function renderCaseTable(){
  const isAdmin=currentUser.role==='admin';
  let cases=CASES;
  if(!isAdmin) cases=cases.filter(c=>c.clinic_id===currentUser.clinic_id);
  
  const search=document.getElementById('dashSearchInput')?.value.toLowerCase()||'';
  const clinicF=document.getElementById('dashClinicFilter')?.value||'';
  
  if(dashFilter==='remake') cases=cases.filter(c=>c.is_remake);
  else if(dashFilter!=='all') cases=cases.filter(c=>c.status===dashFilter);
  if(search) cases=cases.filter(c=>{
  const teeth = c.tooth_numbers || c.tooth_number || '';
  return (c.patient_name+teeth+c.clinic_name).toLowerCase().includes(search);
});

  if(clinicF) cases=cases.filter(c=>c.clinic_id===clinicF);
  
  cases.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  
  const total=cases.length;
  const pages=Math.ceil(total/DASH_PER_PAGE);
  const paged=cases.slice((dashPage-1)*DASH_PER_PAGE,dashPage*DASH_PER_PAGE);
  
  // Batch bar
  const bb=document.getElementById('batchBar');
  if(dashSelectedIds.size>0&&isAdmin){
    bb.className='batch-bar';
    bb.innerHTML=`<span class="batch-info">✅ ${dashSelectedIds.size}개 선택됨</span>
    <div class="batch-actions">
      ${['working','design','making','ship','done'].map(s=>`<button class="batch-select-btn" onclick="batchChangeStatus('${s}')">${statusLabel(s)}</button>`).join('')}
      <button class="batch-close-btn" onclick="dashSelectedIds.clear();renderCaseTable()">✕</button>
    </div>`;
  } else {bb.className='hidden';}
  
  const wrap=document.getElementById('caseTableWrap');
  if(!paged.length){wrap.innerHTML=`<div style="text-align:center;padding:48px;color:var(--text3);">🔍 검색 결과가 없습니다</div>`;return;}
  
  wrap.innerHTML=`
  <div class="table-wrap">
  <table class="table">
    <thead><tr>
      ${isAdmin?'<th style="width:36px;"><input type="checkbox" onchange="toggleAllCheck(this)"></th>':''}
      <th>케이스 번호</th>
      <th>거래처</th>
      <th>환자</th>
      <th>보철명</th>
      <th>치아</th>
      <th>단가</th>
      <th>상태</th>
      <th>납기일</th>
      <th></th>
    </tr></thead>
    <tbody>
    ${paged.map(c=>`
    <tr class="${dashSelectedIds.has(c.id)?'selected':''}" style="cursor:pointer;" onclick="openCaseDetail('${c.id}')">
      ${isAdmin?`<td onclick="event.stopPropagation()"><input type="checkbox" ${dashSelectedIds.has(c.id)?'checked':''} onchange="toggleCaseCheck('${c.id}',this)"></td>`:''}
      <td><span class="font-mono" style="font-size:11px;color:var(--text3);">${c.case_number}</span>${c.is_remake?` <span class="tag" style="background:var(--red-l);color:var(--red);">리메이크</span>`:''}</td>
      <td><span style="font-weight:600;">${c.clinic_name}</span></td>
      <td>${c.patient_name}</td>
      <td>${c.product_name}</td>
      <td><span class="font-mono">#${formatToothNumbers(c.tooth_numbers||c.tooth_number)}</span>${c.tooth_count>1?`<span class="tag" style="background:var(--blue-l);color:var(--blue);margin-left:4px;">${c.tooth_count}개</span>`:''}</td>
      <td class="font-mono">${fmt(c.final_price)}${c.tooth_count>1?`<div style="font-size:10px;color:var(--text3);">(${fmt(c.price)}×${c.tooth_count})</div>`:''}</td>
      <td><span class="badge badge-${c.status}">${statusLabel(c.status)}</span></td>
      <td style="color:${isOverdue(c)?'var(--red)':'var(--text2)'};font-weight:${isOverdue(c)?700:400};">${c.ship_date}${isOverdue(c)?' ⚠️':''}</td>
      <td onclick="event.stopPropagation()">
        ${isAdmin?`<button class="btn btn-ghost btn-icon btn-sm" onclick="openCaseDetail('${c.id}')">›</button>`:`<button class="btn btn-secondary btn-xs" onclick="openCaseDetail('${c.id}')">보기</button>`}
      </td>
    </tr>`).join('')}
    </tbody>
  </table>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 4px;font-size:12px;color:var(--text3);">
    <span>총 ${total}건 (${dashPage}/${pages} 페이지)</span>
    <div style="display:flex;gap:4px;">
      ${dashPage>1?`<button class="btn btn-secondary btn-xs" onclick="dashPage--;renderCaseTable()">‹ 이전</button>`:''}
      ${dashPage<pages?`<button class="btn btn-secondary btn-xs" onclick="dashPage++;renderCaseTable()">다음 ›</button>`:''}
    </div>
  </div>`;
}

function isOverdue(c){return c.status!=='done'&&new Date(c.ship_date)<new Date();}

function toggleCaseCheck(id,cb){if(cb.checked)dashSelectedIds.add(id);else dashSelectedIds.delete(id);renderCaseTable();}
function toggleAllCheck(cb){const visible=document.querySelectorAll('tbody tr');visible.forEach(tr=>{const id=tr.querySelector('input[type=checkbox]')?.closest('td')?.nextElementSibling?.previousElementSibling;});

  // Re-scan current page
  const paged=getPagedCases();
  if(cb.checked) paged.forEach(c=>dashSelectedIds.add(c.id));
  else paged.forEach(c=>dashSelectedIds.delete(c.id));
  renderCaseTable();
}
function getPagedCases(){
  let cases=CASES;
  if(dashFilter==='remake') cases=cases.filter(c=>c.is_remake);
  else if(dashFilter!=='all') cases=cases.filter(c=>c.status===dashFilter);
  cases.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return cases.slice((dashPage-1)*DASH_PER_PAGE,dashPage*DASH_PER_PAGE);
}
async function batchChangeStatus(status){
  const count=dashSelectedIds.size;
  dashSelectedIds.forEach(id=>{const c=CASES.find(x=>x.id===id);if(c){c.status=status;c.history.push({status,changed_at:new Date().toISOString(),changed_by:currentUser.name});}});

  dashSelectedIds.clear();
  await autoSave('cases', CASES);  // Supabase + localStorage에 저장
  renderCaseTable();
  showToast(`${count}개 케이스 → ${statusLabel(status)} 변경 완료`,'success');
}

async function changeCaseStatus(id,status){
  const c=CASES.find(x=>x.id===id);
  if(!c)return;
  c.status=status;
  c.history.push({status,changed_at:new Date().toISOString(),changed_by:currentUser.name});

  if(status==='done'){
    const product=PRODUCTS.find(p=>p.id===c.product_id);
    PRODUCTION_LOG.push({id:`pl_${Date.now()}`,case_id:c.id,product_id:c.product_id,product_name:c.product_name,clinic_id:c.clinic_id,clinic_name:c.clinic_name,quantity:1,selling_price:c.price,material_cost:product?.material_cost||0,final_price:c.final_price,production_date:new Date().toISOString().slice(0,10)});

    autoSave();  // PRODUCTION_LOG 저장
  }
  await autoSave('cases', CASES);
  openCaseDetail(id);
  renderDashboard();
  showToast(`상태가 "${statusLabel(status)}"으로 변경되었습니다.`,'success');
}

    closeDetailPanel();renderDashboard();
    showToast('케이스가 삭제되었습니다.','success');
  });

}

function renderToothSelector(selectedTeeth=[]){
  const container=document.getElementById('toothSelector');
  const hiddenInput=document.getElementById('cm_tooth');
  if(!container)return;
  
  const toArr = Array.isArray(selectedTeeth) ? selectedTeeth : parseToothNumbers(selectedTeeth);
  
  const renderQuadrant=(title,teeth)=>`
    <div class="tooth-section">
      <div class="tooth-section-title">${title}</div>
      <div class="tooth-grid">
        ${teeth.map(t=>`
          <button type="button" class="tooth-btn ${MOLAR_NUMBERS.includes(t)?'molar':''} ${toArr.includes(String(t))?'selected':''}" 
            data-tooth="${t}" onclick="toggleTooth(${t})">${t}</button>
        `).join('')}
      </div>
    </div>`;
  
  container.innerHTML=`
    <div class="tooth-quadrant">
      <div class="tooth-row">
        ${renderQuadrant('상단 (우) 18 17 16 15 14 13 12 11',[...TOOTH_DATA.upperRight].reverse())}
        ${renderQuadrant('상단 (좌) 21 22 23 24 25 26 27 28',TOOTH_DATA.upperLeft)}
      </div>
      <div class="tooth-row">
        ${renderQuadrant('하단 (우) 41 42 43 44 45 46 47 48',TOOTH_DATA.lowerRight)}
        ${renderQuadrant('하단 (좌) 38 37 36 35 34 33 32 31',[...TOOTH_DATA.lowerLeft].reverse())}
      </div>
    </div>`;
  
  updateToothDisplay(toArr);
}

function toggleTooth(toothNum){
  let selected=document.getElementById('cm_tooth').value;
  let arr=selected?selected.split(',').filter(t=>t):[];
  const idx=arr.indexOf(String(toothNum));
  if(idx>-1)arr.splice(idx,1);
  else arr.push(toothNum);
  arr.sort((a,b)=>parseInt(a)-parseInt(b));
  document.getElementById('cm_tooth').value=arr.join(',');
  
  document.querySelectorAll('.tooth-btn').forEach(btn=>{
    const t=parseInt(btn.dataset.tooth);
    btn.classList.toggle('selected',arr.includes(String(t)));
  });

  
  updateToothDisplay(arr);
  updateCasePrice();
}

function updateToothDisplay(selectedTeeth){
  const list=document.getElementById('toothSelectedList');
  if(!list)return;
  const arr=Array.isArray(selectedTeeth)?selectedTeeth:(selectedTeeth?selectedTeeth.split(','):[]);
  if(arr.length===0){
    list.innerHTML='<span style="color:var(--text3);font-size:12px;">치를 선택하세요</span>';
    return;
  }
  list.innerHTML=arr.map(t=>`
    <span class="tooth-chip">${t}<button type="button" class="tooth-chip-remove" onclick="removeTooth(${t})">×</button></span>
  `).join('')+'<span class="tooth-clear-btn" onclick="clearAllTeeth()">전체 해제</span>';
}

function removeTooth(toothNum){
  toggleTooth(toothNum);
}

function clearAllTeeth(){
  document.getElementById('cm_tooth').value='';
  document.querySelectorAll('.tooth-btn').forEach(btn=>btn.classList.remove('selected'));
  updateToothDisplay([]);
}

function parseToothNumbers(toothStr){
  if(!toothStr)return[];
  return toothStr.split(',').map(t=>t.trim()).filter(t=>t);
}

function formatToothNumbers(toothData){
  if(!toothData)return'-';
  const arr=Array.isArray(toothData)?toothData:String(toothData).split(',').map(t=>t.trim()).filter(t=>t);
  if(arr.length===0)return'-';
  if(arr.length===1)return arr[0];
  return arr.join(', ');
}
function updateCasePrice(){
  const sel = document.getElementById('cm_product')?.value;
  const clinicId = document.getElementById('cm_clinic')?.value;
  const p = PRODUCTS.find(x=>x.id===sel);
  const cl = CLINICS.find(x=>x.id===clinicId);
  const preview = document.getElementById('cm_price_preview');
  if(!preview)return;
  if(!p){preview.innerHTML='';return;}
  
  const toothValue = document.getElementById('cm_tooth').value;
  const toothCount = toothValue ? toothValue.split(',').filter(t=>t).length : 0;
  const dr = (cl?.discount_rate||0)/100;
  const unitFinal = Math.round(p.selling_price*(1+dr));
  const totalFinal = unitFinal * (toothCount || 1);
  
  if(toothCount > 1){
    preview.innerHTML = `💰 단가: <b class="font-mono">${fmt(unitFinal)}</b> × <b>${toothCount}개</b> = <b class="font-mono" style="color:var(--blue);font-size:15px;">${fmt(totalFinal)}</b> (할인율: ${cl?.discount_rate||0}%)`;
  } else {

async function saveCaseModal(editId){
  const clinicId = document.getElementById('cm_clinic').value;
  const patient = document.getElementById('cm_patient').value.trim();
  const productId = document.getElementById('cm_product').value;
  const toothValue = document.getElementById('cm_tooth').value;
  
  if(!clinicId||!patient||!productId){showToast('필수 항목을 입력하세요.','error');return;}
  
  // 입력값 검증 (XSS 방지)
  if(patient.length > 50) {showToast('患者명은 50자 이하여야 합니다.','error');return;}
  if(/[<>\"\'&]/.test(patient)) {showToast('患者명에 특수문자는 사용할 수 없습니다.','error');return;}
  
  const clinic = CLINICS.find(c=>c.id===clinicId);
  const product = PRODUCTS.find(p=>p.id===productId);
  const dr = (clinic?.discount_rate||0)/100;
  const unitPrice = product.selling_price;
  const unitFinal = Math.round(unitPrice*(1+dr));
  
  const toothNumbers = toothValue ? toothValue.split(',').filter(t=>t) : [];
  const toothCount = toothNumbers.length || 1;
  const finalPrice = unitFinal * toothCount;
  
  if(editId){
    const c=CASES.find(x=>x.id===editId);
    Object.assign(c,{
      clinic_id:clinicId,clinic_name:clinic.name,patient_name:patient,
      product_id:productId,product_name:product.name,
      tooth_number:toothValue,tooth_numbers:toothNumbers,
      tooth_count:toothCount,
      type:document.getElementById('cm_type').value,
      ship_date:document.getElementById('cm_ship').value,
      memo:document.getElementById('cm_memo').value,
      price:unitPrice,discount_rate:clinic.discount_rate,final_price:finalPrice
    });

    showToast('케이스가 수정되었습니다.','success');
  } else {
    const id=`case${Date.now()}`;
    const maxNum = CASES.reduce((max, c) => {
      const n = parseInt((c.case_number||'').split('-')[2]) || 0;
      return n > max ? n : max;
    }, 0);
    const year = new Date().getFullYear();
    const num = `ERD-${year}-${String(maxNum+1).padStart(4,'0')}`;
    CASES.unshift({
      id,case_number:num,clinic_id:clinicId,clinic_name:clinic.name,patient_name:patient,
      product_id:productId,product_name:product.name,
      tooth_number:toothValue,tooth_numbers:toothNumbers,
      tooth_count:toothCount,
      type:document.getElementById('cm_type').value,
      price:unitPrice,discount_rate:clinic.discount_rate,final_price:finalPrice,
      status:'working',is_remake:false,
      receive_date:new Date().toISOString().slice(0,10),
      ship_date:document.getElementById('cm_ship').value,
      memo:document.getElementById('cm_memo').value,
      history:[{status:'working',changed_at:new Date().toISOString(),changed_by:currentUser.name}],
      created_at:new Date().toISOString()
    });

    showToast('케이스가 등록되었습니다.','success');
  }
  await autoSave('cases', CASES);
  closeModal();renderDashboard();
}

function calcBEP(yearMonth){
  const prodInMonth=PRODUCTION_LOG.filter(l=>l.production_date.startsWith(yearMonth));
  const fc=calcMonthlyFixedCosts(yearMonth);
  
  if(!prodInMonth.length){
    return {isValid:true,fixedCosts:fc,weightedSellingPrice:0,weightedMaterialCost:0,contributionMargin:0,contributionMarginRatio:0,bepQuantity:0,bepRevenue:0,currentQuantity:0,currentRevenue:0,currentMaterialCost:0,currentContribution:0,netProfit:-fc,achievementRate:0,neededQuantity:0,status:'loss'};
  }
  
  let totalRevenue=0,totalMaterialCost=0,totalQty=0;
  prodInMonth.forEach(l=>{
    totalRevenue+=l.selling_price*l.quantity;
    totalMaterialCost+=l.material_cost*l.quantity;
    totalQty+=l.quantity;
  });

  
  const wsp=totalRevenue/totalQty;
  const wmc=totalMaterialCost/totalQty;
  const cm=wsp-wmc;
  const cmr=(cm/wsp)*100;
  
  if(cm<=0) return {isValid:false,errorMessage:'공헌이익 0 이하',contributionMargin:cm,achievementRate:0,status:'loss',netProfit:-fc,currentQuantity:totalQty,currentRevenue:totalRevenue,currentMaterialCost:totalMaterialCost,currentContribution:0,bepQuantity:Infinity,bepRevenue:Infinity,weightedSellingPrice:Math.round(wsp),weightedMaterialCost:Math.round(wmc),contributionMarginRatio:cmr,neededQuantity:Infinity,fixedCosts:fc};
  
  const bepQty=fc>0?Math.ceil(fc/cm):0;
  const bepRev=bepQty*wsp;
  const contrib=totalRevenue-totalMaterialCost;
  const netProfit=contrib-fc;
  const ar=bepQty>0?(totalQty/bepQty*100):100;
  const needed=netProfit<0?Math.ceil(-netProfit/cm):0;
  const status=Math.abs(netProfit)<1000?'breakeven':netProfit>0?'profit':'loss';
  
  return {isValid:true,fixedCosts:fc,weightedSellingPrice:Math.round(wsp),weightedMaterialCost:Math.round(wmc),contributionMargin:Math.round(cm),contributionMarginRatio:Math.round(cmr*10)/10,bepQuantity:bepQty,bepRevenue:Math.round(bepRev),currentQuantity:totalQty,currentRevenue:Math.round(totalRevenue),currentMaterialCost:Math.round(totalMaterialCost),currentContribution:Math.round(contrib),netProfit:Math.round(netProfit),achievementRate:Math.round(ar*10)/10,neededQuantity:needed,status};
}

function calcMonthlyFixedCosts(yearMonth){
  const [y,m]=yearMonth.split('-').map(Number);
  const target=new Date(y,m-1,1);
  return FIXED_COSTS.filter(f=>!f.is_deleted&&f.is_active).reduce((sum,f)=>{
    const start=new Date(f.start_date);
    const end=f.end_date?new Date(f.end_date):new Date(2099,11,31);
    return (target>=start&&target<=end)?sum+f.amount:sum;
  },0);
}
function getMonthFixedCostItems(yearMonth){
  const [y,m]=yearMonth.split('-').map(Number);
  const target=new Date(y,m-1,1);
  return FIXED_COSTS.filter(f=>{
    if(f.is_deleted||!f.is_active)return false;
    const start=new Date(f.start_date);
    const end=f.end_date?new Date(f.end_date):new Date(2099,11,31);
    return target>=start&&target<=end;
  });

}

function drawBEPTrendChart(){
  const ctx=document.getElementById('bepTrendChart');
  if(!ctx)return;
  const months=[];const base=new Date(bepMonth+'-01');
  for(let i=5;i>=0;i--){const d=new Date(base);d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const revenues=months.map(m=>PRODUCTION_LOG.filter(l=>l.production_date.startsWith(m)).reduce((s,l)=>s+l.final_price*l.quantity,0)/10000);
  const fcList=months.map(m=>calcMonthlyFixedCosts(m)/10000);
  const profits=months.map((m,i)=>{const bep=calcBEP(m);return bep.netProfit/10000;});

  
  if(window._bepChart) window._bepChart.destroy();
  window._bepChart=new Chart(ctx,{
    type:'bar',
    data:{labels:months,datasets:[
      {label:'매출 (만원)',data:revenues,backgroundColor:'rgba(37,99,235,.2)',borderColor:'#2563eb',borderWidth:2,type:'bar'},
      {label:'고정비 (만원)',data:fcList,backgroundColor:'transparent',borderColor:'#dc2626',borderWidth:2,type:'line',tension:.4,pointBackgroundColor:'#dc2626'},
      {label:'순이익 (만원)',data:profits,backgroundColor:'transparent',borderColor:'#16a34a',borderWidth:2,type:'line',tension:.4,pointBackgroundColor:'#16a34a'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toFixed(0)}만원`}}},scales:{y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{callback:v=>`${v}만`}}}}
  });

}

async function saveFCModal(editId){

function openProductModal(id=null){
  const p=id?PRODUCTS.find(x=>x.id===id):null;
  openModal(p?'보철 수정':'보철 추가',`
  <div class="form-group"><label>보철명 *</label><input class="input" id="pm_name" value="${p?.name||''}" placeholder="예: 지르코니아 크라운"></div>
  <div class="form-row">
    <div class="form-group"><label>판매단가 (원) *</label><input class="input" type="number" id="pm_sell" value="${p?.selling_price||''}" placeholder="60000" oninput="updateProductPreview()"></div>
    <div class="form-group"><label>재료원가 (원) *</label><input class="input" type="number" id="pm_cost" value="${p?.material_cost||''}" placeholder="18000" oninput="updateProductPreview()"></div>
  </div>
  <div class="form-group"><label>단위</label><input class="input" id="pm_unit" value="${p?.unit||'개'}" placeholder="개"></div>
  <div id="pm_preview" style="background:var(--green-l);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;border:1px solid #86efac;"></div>
  `,
  `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
   <button class="btn btn-primary" onclick="saveProductModal('${id||''}')">💾 저장</button>`);
  updateProductPreview();
}
function updateProductPreview(){
  const sell=parseInt(document.getElementById('pm_sell')?.value)||0;
  const cost=parseInt(document.getElementById('pm_cost')?.value)||0;
  const prev=document.getElementById('pm_preview');
  if(!prev)return;
  if(!sell){prev.innerHTML='';return;}
  const cm=sell-cost;const cmr=sell>0?(cm/sell*100).toFixed(1):0;
  const ok=cm>0;
  prev.style.background=ok?'var(--green-l)':'var(--red-l)';
  prev.style.borderColor=ok?'#86efac':'#fca5a5';
  prev.innerHTML=ok?`✅ 공헌이익 <b class="font-mono">${fmt(cm)}</b> · 공헌이익률 <b>${cmr}%</b>`:`❌ 원가가 판매가보다 크거나 같습니다.`;
}
async function saveProductModal(editId){
  const name=document.getElementById('pm_name').value.trim();
  const sell=parseInt(document.getElementById('pm_sell').value);
  const cost=parseInt(document.getElementById('pm_cost').value);
  if(!name||!sell||isNaN(cost)){showToast('필수 항목을 입력하세요.','error');return;}
  if(sell<=0){showToast('판매단가는 0보다 커야 합니다.','error');return;}
  if(cost<0){showToast('재료원가는 0 이상이어야 합니다.','error');return;}
  if(cost>=sell){showToast('재료원가는 판매단가보다 작아야 합니다.','error');return;}
  if(editId){
    const p=PRODUCTS.find(x=>x.id===editId);
    Object.assign(p,{name,selling_price:sell,material_cost:cost,unit:document.getElementById('pm_unit').value});

    showToast('보철 정보가 수정되었습니다.','success');
  } else {
    PRODUCTS.push({id:`p${Date.now()}`,name,selling_price:sell,material_cost:cost,unit:document.getElementById('pm_unit').value||'개',is_active:true,is_deleted:false});

    showToast('보철이 추가되었습니다.','success');
  }
  await autoSave('cases', CASES);
  closeModal();renderProducts();
}
async function deleteProduct(id){
  showConfirm('보철 삭제','이 보철 정보를 삭제하시겠습니까?',async ()=>{
    const p=PRODUCTS.find(x=>x.id===id);if(p){p.is_deleted=true;p.is_active=false;}
    await autoSave('cases', CASES);
    renderProducts();showToast('보철이 삭제되었습니다.','success');
  });

}

    <div class="card-body">
      <div class="chart-wrap" style="height:260px;"><canvas id="salesChart"></canvas></div>
    </div>
  </div>`;
  
  setTimeout(()=>{
    const ctx=document.getElementById('salesChart');
    const months=[];const base=new Date();
    for(let i=5;i>=0;i--){const d=new Date(base);d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
    const data=months.map(m=>CASES.filter(c=>c.status==='done'&&c.receive_date.startsWith(m)).reduce((s,c)=>s+c.final_price,0)/10000);

// 치과 사용자 - 설정에서 자기 거래처 정보 저장
async function saveClinicSettings(clinicId){
  const name    = document.getElementById('cl_set_name')?.value.trim();
  const owner   = document.getElementById('cl_set_owner')?.value.trim();
  const phone   = document.getElementById('cl_set_phone')?.value.trim();
  const email   = document.getElementById('cl_set_email')?.value.trim();
  const address = document.getElementById('cl_set_address')?.value.trim();

  if(!name){ showToast('치과명을 입력하세요.','error'); return; }

  const clinic = CLINICS.find(c => c.id === clinicId);
  if(!clinic){ showToast('거래처 정보를 찾을 수 없습니다.','error'); return; }

  // 할인율은 건드리지 않음 (관리자 전용)
  Object.assign(clinic, { name, owner, phone, email, address });

  // 연결된 케이스의 clinic_name도 동기화
  CASES.forEach(c => {
    if(c.clinic_id === clinicId) c.clinic_name = name;
  });

  await autoSave('users', USERS);
  await autoSave('clinics', CLINICS);
  showToast('치과 정보가 저장되었습니다.','success');
  renderSettings();
}

async function saveMySettings(){
  const name = document.getElementById('settings_name').value.trim();
  const email = document.getElementById('settings_email').value.trim();
  const password = document.getElementById('settings_password').value;
  const passwordConfirm = document.getElementById('settings_password_confirm')?.value || '';
  const username = document.getElementById('settings_username')?.value.trim();
  
  if(!name || !email || !username){showToast('아이디, 이름, 이메일을 모두 입력하세요.','error');return;}
  
  // 비밀번호 변경 시 확인 검증
  if(password && password !== passwordConfirm){
    showToast('비밀번호가 일치하지 않습니다.','error');return;
  }
  if(password && password.length < 6){
    showToast('비밀번호는 6자 이상이어야 합니다.','error');return;
  }
  
  const existingUser = USERS.find(u=>u.username === username && u.id !== currentUser.id);
  if(existingUser){showToast('이미 사용 중인 아이디입니다.','error');return;}
  
  const userIdx = USERS.findIndex(u=>u.id === currentUser.id);
  if(userIdx > -1){
    USERS[userIdx].name = name;
    USERS[userIdx].email = email;
    USERS[userIdx].username = username;
    currentUser.username = username;
    if(password){
      hashPassword(password).then(hash => {
        USERS[userIdx].password_hash = hash;
        delete USERS[userIdx].password;
      });
    }
    currentUser.name = name;
    currentUser.email = email;
    if(password){
      showToast('모든 정보가 변경되었습니다.','success');
    } else {
      showToast('정보가 변경되었습니다.','success');
    }
    await autoSave('cases', CASES);
    document.getElementById('sidebarName').textContent = currentUser.name;
    document.getElementById('settings_password').value = '';
    renderSettings();
  }
}

async function saveUserModal(userId){
  const username = document.getElementById('um_username').value.trim();
  const password = document.getElementById('um_password').value;
  const passwordConfirm = document.getElementById('um_password_confirm')?.value || '';
  const name = document.getElementById('um_name').value.trim();
  const email = document.getElementById('um_email').value.trim();
  const role = document.getElementById('um_role').value;
  const clinicId = document.getElementById('um_clinic_id')?.value || null;

  if(!username || !name || !email){showToast('필수 항목을 입력하세요.','error');return;}
  if(!userId && !password){showToast('신규 사용자는 비밀번호를 입력하세요.','error');return;}
  if(password && password.length < 6){showToast('비밀번호는 6자 이상이어야 합니다.','error');return;}
  if(password && password !== passwordConfirm){showToast('비밀번호가 일치하지 않습니다.','error');return;}

  // 이메일 형식 검증
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(email && !emailRegex.test(email)){showToast('이메일 형식이 올바르지 않습니다.','error');return;}

  // 아이디 중복 체크
  const dup = USERS.find(u => u.username === username && u.id !== userId);
  if(dup){showToast('이미 사용 중인 아이디입니다.','error');return;}

  if(userId){
    const idx = USERS.findIndex(u=>u.id===userId);
    if(idx>-1){
      USERS[idx].name = name;
      USERS[idx].email = email;
      USERS[idx].role = role;
      if(clinicId !== null) USERS[idx].clinic_id = clinicId || null;
      if(password){
        const hash = await hashPassword(password);
        USERS[idx].password_hash = hash;
        delete USERS[idx].password;
      }
      showToast('사용자 정보가 수정되었습니다.','success');
    }
  } else {
    const hash = await hashPassword(password);
    const id = 'u' + Date.now();
    USERS.push({id, username, password_hash:hash, name, email, role, clinic_id:clinicId||null});
    showToast('사용자가 추가되었습니다.','success');
  }
  await autoSave('users', USERS);
  closeModal();
  renderSettings();
}

function resetUserPassword(userId){
  const user = USERS.find(u => u.id === userId);
  if(!user){ showToast('사용자를 찾을 수 없습니다.', 'error'); return; }

  openModal('🔑 비밀번호 초기화', `

    </div>
    <div class="form-group">
      <label>새 비밀번호 *</label>
      <input class="input" type="password" id="reset_pw" placeholder="6자 이상">
    </div>
    <div class="form-group">
      <label>비밀번호 확인 *</label>
      <input class="input" type="password" id="reset_pw_confirm" placeholder="다시 입력">
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="doResetUserPassword('${userId}')">🔑 변경 완료</button>
  `);
}

async function doResetUserPassword(userId){
  const pw = document.getElementById('reset_pw')?.value;
  const pwc = document.getElementById('reset_pw_confirm')?.value;
  if(!pw || pw.length < 6){ showToast('비밀번호는 6자 이상이어야 합니다.','error'); return; }
  if(pw !== pwc){ showToast('비밀번호가 일치하지 않습니다.','error'); return; }

  const idx = USERS.findIndex(u => u.id === userId);
  if(idx < 0){ showToast('사용자를 찾을 수 없습니다.','error'); return; }

  const hash = await hashPassword(pw);
  USERS[idx].password_hash = hash;
  delete USERS[idx].password;

  await autoSave('users', USERS);
  closeModal();
  showToast(`${USERS[idx].name} 님의 비밀번호가 변경되었습니다.`, 'success');
}

// ── 데이터 백업 (JSON 파일 다운로드) ──
function backupData(){
  const backup = {
    version: 'v5.0',
    backup_date: new Date().toISOString(),
    users: USERS.map(u => { const {password, ...rest} = u; return rest; }),
    clinics: CLINICS,
    products: PRODUCTS,
    fixed_costs: FIXED_COSTS,
    cases: CASES,
    production_log: PRODUCTION_LOG
  };

  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `이룸덴탈랩_백업_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 파일이 다운로드되었습니다.', 'success');
}

// ── 데이터 복원 (JSON 파일 업로드) ──
function restoreData(){
  openModal('📂 데이터 복원', `
    <div style="padding:12px;background:var(--red-l);border-radius:8px;font-size:13px;margin-bottom:14px;color:#991b1b;">
      ⚠️ <b>주의:</b> 복원 시 현재 데이터가 모두 백업 파일로 교체됩니다.<br>
      반드시 먼저 백업을 받아두세요.
    </div>
    <div class="form-group">
      <label>백업 파일 선택 (.json)</label>
      <input type="file" id="restore_file" accept=".json" class="input" style="padding:6px;">
    </div>
    <div id="restore_preview" style="font-size:12px;color:var(--text3);margin-top:8px;"></div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-danger" onclick="doRestoreData()">📂 복원 실행</button>
  `);

  // 파일 선택 시 미리보기
  setTimeout(() => {
    document.getElementById('restore_file')?.addEventListener('change', function(e){
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          document.getElementById('restore_preview').innerHTML =
            `✅ 백업 확인: <b>${data.backup_date?.slice(0,10)||'날짜 없음'}</b> · 케이스 <b>${data.cases?.length||0}건</b> · 사용자 <b>${data.users?.length||0}명</b>`;
        } catch {
          document.getElementById('restore_preview').innerHTML = '❌ 올바른 백업 파일이 아닙니다.';
        }
      };
      reader.readAsText(file);
    });
  }, 100);
}

async function doRestoreData(){
  const file = document.getElementById('restore_file')?.files[0];
  if(!file){ showToast('파일을 선택하세요.','error'); return; }

  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.cases || !data.users){ showToast('올바른 백업 파일이 아닙니다.','error'); return; }

      // 데이터 복원
      if(data.users)        USERS          = data.users;
      if(data.clinics)      CLINICS        = data.clinics;
      if(data.products)     PRODUCTS       = data.products;
      if(data.fixed_costs)  FIXED_COSTS    = data.fixed_costs;
      if(data.cases)        CASES          = data.cases;
      if(data.production_log) PRODUCTION_LOG = data.production_log;

      // localStorage에 저장
      saveToLocal('users',          USERS);
      saveToLocal('clinics',        CLINICS);
      saveToLocal('products',       PRODUCTS);
      saveToLocal('fixed_costs',    FIXED_COSTS);
      saveToLocal('cases',          CASES);
      saveToLocal('production_log', PRODUCTION_LOG);

      closeModal();
      showToast(`복원 완료 — 케이스 ${CASES.length}건, 사용자 ${USERS.length}명`, 'success');
      renderSettings();
    } catch {
      showToast('파일 읽기 오류가 발생했습니다.','error');
    }
  };
  reader.readAsText(file);
}

async function deleteUser(userId){
  if(userId === 'u1'){showToast('기본 관리자는 삭제할 수 없습니다.','error');return;}
  showConfirm('사용자 삭제','정말 이 사용자를 삭제하시겠습니까?',async ()=>{
    const idx = USERS.findIndex(u=>u.id===userId);
    if(idx>-1){
      USERS.splice(idx,1);
      await autoSave('cases', CASES);
      showToast('사용자가 삭제되었습니다.','success');
      renderSettings();
    }
  });

}

//  MODAL & CONFIRM HELPERS
// ══════════════════════════════════════════════════

function openModal(title,body,footer='',lg=false){
  document.getElementById('modalTitle').innerHTML=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer;
  document.getElementById('modalBox').className='modal'+(lg?' modal-lg':'');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

let confirmCallback=null;
function showConfirm(title,msg,cb,icon='⚠️'){
  document.getElementById('confirmIcon').textContent=icon;
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  confirmCallback=cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');confirmCallback=null;}
document.getElementById('confirmOkBtn').onclick=function(){if(confirmCallback)confirmCallback();closeConfirm();};

// Close modals on overlay click
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

document.getElementById('confirmOverlay').addEventListener('click',function(e){if(e.target===this)closeConfirm();});


// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeDetailPanel();closeConfirm();}
  if((e.ctrlKey||e.metaKey)&&e.key==='n'&&currentUser?.role==='admin'){e.preventDefault();navigate('dashboard');setTimeout(openCaseModal,100);}
});


// ══════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════

function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  const icons={success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span>${icons[type]||'✅'}</span><span style="flex:1;">${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .3s ease forwards';setTimeout(()=>t.remove(),300);},3000);
}
