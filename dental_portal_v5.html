<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이룸덴탈랩 포털 v5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   이룸덴탈랩 포털 v5.0 — UI 리디자인
   Modern Clean · Blue Accent · Professional
═══════════════════════════════════════════════════ */

:root {
  /* ── 브랜드 컬러 ── */
  --primary:#2563eb;--primary-d:#1d4ed8;--primary-l:#eff6ff;--primary-m:#dbeafe;
  --primary-hover:#1e56d8;

  /* ── 시맨틱 컬러 ── */
  --green:#16a34a;--green-l:#f0fdf4;--green-m:#dcfce7;
  --yellow:#d97706;--yellow-l:#fffbeb;--yellow-m:#fef3c7;
  --red:#dc2626;--red-l:#fef2f2;--red-m:#fee2e2;
  --purple:#7c3aed;--purple-l:#f5f3ff;--purple-m:#ede9fe;
  --sky:#0ea5e9;--sky-l:#f0f9ff;--sky-m:#e0f2fe;
  --teal:#0d9488;--teal-l:#f0fdfa;
  --orange:#ea580c;--orange-l:#fff7ed;

  /* ── 중립 컬러 ── */
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --slate:#64748b;--slate-l:#f8fafc;

  /* ── 레이아웃 ── */
  --bg:#f1f5f9;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --border:#e2e8f0;
  --border2:#cbd5e1;

  /* ── 텍스트 ── */
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;

  /* ── 그림자 ── */
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,.1),0 10px 10px -5px rgba(0,0,0,.04);
  --shadow-xl:0 25px 50px -12px rgba(0,0,0,.18);

  /* ── 공통 ── */
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --transition:.18s cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
button,input,select,textarea{font-family:inherit;}
.font-mono{font-family:'DM Mono',monospace;}

/* ══ 스크롤바 ══ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--slate);}

/* ══ 애니메이션 ══ */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.95)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ 레이아웃 ══ */
.app{display:flex;height:100vh;overflow:hidden;}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:28px 32px;}

/* ══ 사이드바 ══ */
.sidebar{
  width:248px;background:var(--navy);flex-shrink:0;
  display:flex;flex-direction:column;position:relative;
  box-shadow:4px 0 24px rgba(0,0,0,.15);
  transition:width var(--transition);
}
.sidebar-logo{
  padding:24px 20px 20px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.sidebar-logo-mark{
  width:38px;height:38px;
  background:var(--primary);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:10px;
}
.sidebar-logo-title{font-size:15px;font-weight:700;color:#fff;line-height:1.2;}
.sidebar-logo-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-section{
  padding:14px 20px 5px;
  font-size:10px;font-weight:600;
  color:rgba(255,255,255,.25);
  letter-spacing:.5px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;
  color:rgba(255,255,255,.5);font-size:13px;font-weight:500;
  cursor:pointer;transition:all var(--transition);
  border:none;background:none;width:100%;text-align:left;
  border-left:3px solid transparent;
  margin:1px 0;
}
.nav-item:hover{
  background:rgba(255,255,255,.07);
  color:rgba(255,255,255,.9);
  border-left-color:rgba(255,255,255,.15);
}
.nav-item.active{
  background:rgba(37,99,235,.2);
  color:#93c5fd;
  border-left-color:var(--primary);
}
.nav-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .new-badge{
  margin-left:auto;
  background:rgba(37,99,235,.45);color:#93c5fd;
  font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;
}
.sidebar-footer{
  padding:16px 20px;
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px;
}
.sidebar-avatar{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.sidebar-name{font-size:13px;font-weight:600;color:#fff;line-height:1.3;}
.sidebar-role{font-size:11px;color:rgba(255,255,255,.35);}

/* ══ 상단바 ══ */
.topbar{
  height:60px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 28px;gap:16px;
  box-shadow:var(--shadow-sm);
  flex-shrink:0;position:relative;z-index:10;
}
.topbar-title{font-size:16px;font-weight:700;flex:1;color:var(--text);}
.topbar-badge{
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:600;
}
.badge-admin{background:var(--primary-m);color:var(--primary-d);}
.badge-clinic{background:var(--sky-m);color:#0369a1;}
.menu-toggle{
  display:none;background:none;border:none;
  cursor:pointer;padding:8px;border-radius:var(--radius-xs);
  color:var(--text2);font-size:18px;
}

/* ══ 카드 ══ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.card-header{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text);}
.card-body{padding:22px;}
.card-sm .card-body{padding:16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

/* ══ 대시보드 스탯 카드 ══ */
.stat-card{
  border-radius:var(--radius-sm);padding:14px 16px;
  position:relative;cursor:pointer;
  background:var(--surface);
  border:1px solid var(--border);
  border-top:3px solid var(--border);
  transition:border-color var(--transition),box-shadow var(--transition);
}
.stat-card:hover{box-shadow:var(--shadow);}
.stat-card-icon{display:none;}
.stat-card-label{
  font-size:11px;font-weight:500;
  color:var(--text3);margin-bottom:4px;
}
.stat-card-value{font-size:22px;font-weight:700;line-height:1.1;color:var(--text);}
.stat-card-sub{font-size:11px;margin-top:3px;color:var(--text3);}
.stat-c-yellow{border-top-color:#f59e0b;} .stat-c-yellow .stat-card-value{color:#92400e;}
.stat-c-purple{border-top-color:#8b5cf6;} .stat-c-purple .stat-card-value{color:#5b21b6;}
.stat-c-orange{border-top-color:#f97316;} .stat-c-orange .stat-card-value{color:#9a3412;}
.stat-c-sky{border-top-color:#0ea5e9;}    .stat-c-sky .stat-card-value{color:#075985;}
.stat-c-green{border-top-color:#16a34a;}  .stat-c-green .stat-card-value{color:#14532d;}
.stat-c-red{border-top-color:#dc2626;}    .stat-c-red .stat-card-value{color:#7f1d1d;}
.stat-c-teal{border-top-color:#0d9488;}   .stat-c-teal .stat-card-value{color:#134e4a;}
.stat-c-blue{border-top-color:#2563eb;}   .stat-c-blue .stat-card-value{color:#1e3a8a;}
.stat-c-navy{border-top-color:#334155;}   .stat-c-navy .stat-card-value{color:#0f172a;}

/* ══ 버튼 ══ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 18px;border-radius:var(--radius-sm);border:none;
  font-size:13px;font-weight:600;transition:all var(--transition);
  white-space:nowrap;min-height:38px;cursor:pointer;letter-spacing:.01em;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-d);}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--slate-l);border-color:var(--border2);color:var(--text);}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5;}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--text3);}
.btn-ghost:hover{background:var(--slate-l);color:var(--text);}
.btn-success{background:#dcfce7;color:var(--green);border:1px solid #86efac;}
.btn-success:hover{background:var(--green);color:#fff;}
.btn-sm{padding:6px 13px;font-size:12px;min-height:32px;border-radius:var(--radius-xs);}
.btn-xs{padding:4px 9px;font-size:11px;min-height:26px;border-radius:5px;}
.btn-icon{padding:7px;min-height:32px;width:32px;}
.btn-icon.btn-sm{padding:5px;width:28px;min-height:28px;}
.btn:active{transform:scale(.97);}
.btn.loading span{visibility:hidden;}
.btn.loading::after{
  content:'';position:absolute;width:16px;height:16px;
  border:2px solid transparent;border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
  left:50%;top:50%;transform:translate(-50%,-50%);
}

/* ══ 입력 ══ */
.input,.select{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;color:var(--text);background:var(--surface);
  transition:all var(--transition);outline:none;
}
.input:hover,.select:hover{border-color:var(--border2);}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.input::placeholder{color:var(--text3);}
textarea.input{resize:vertical;min-height:80px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.02em;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ══ 테이블 ══ */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);}
.table{width:100%;border-collapse:collapse;font-size:13px;}
.table th{
  padding:10px 14px;text-align:left;
  font-size:12px;font-weight:600;
  color:var(--text2);
  background:var(--slate-l);
  border-bottom:1px solid var(--border);white-space:nowrap;
}
.table td{
  padding:13px 14px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  transition:background var(--transition);
}
.table tbody tr:hover td{background:#f8faff;}
.table tbody tr:last-child td{border-bottom:none;}
.table tbody tr.selected td{background:var(--primary-l);}

/* ══ 배지 ══ */
.badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;white-space:nowrap;
}
.badge-working{background:var(--yellow-m);color:#92400e;}
.badge-design{background:var(--purple-m);color:#5b21b6;}
.badge-making{background:#fed7aa;color:#9a3412;}
.badge-ship{background:var(--sky-m);color:#075985;}
.badge-done{background:var(--green-m);color:#14532d;}
.badge-remake{background:var(--red-m);color:#7f1d1d;}

/* ══ 태그 ══ */
.tag{
  display:inline-flex;align-items:center;
  padding:2px 7px;border-radius:5px;
  font-size:11px;font-weight:600;
}

/* ══ 상세 패널 ══ */
.detail-panel{
  position:fixed;right:-480px;top:0;bottom:0;
  width:460px;background:var(--surface);
  box-shadow:-8px 0 40px rgba(0,0,0,.12);
  transition:right .3s cubic-bezier(.4,0,.2,1);
  z-index:500;display:flex;flex-direction:column;
  border-left:1px solid var(--border);
}
.detail-panel.open{right:0;}
.detail-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.35);
  opacity:0;pointer-events:none;transition:opacity .3s;z-index:499;
  backdrop-filter:blur(2px);
}
.detail-overlay.open{opacity:1;pointer-events:all;}
.detail-panel-header{
  padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);flex-shrink:0;
}
.detail-panel-title{font-size:15px;font-weight:700;color:var(--text);}
.detail-panel-body{flex:1;overflow-y:auto;padding:24px;}
.detail-panel-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
  background:var(--slate-l);
}

/* ══ 정보 그리드 ══ */
.info-section{margin-bottom:24px;}
.info-section-title{
  font-size:11px;font-weight:600;color:var(--text3);
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:var(--slate-l);border-radius:var(--radius-xs);padding:10px 12px;}
.info-item-full{grid-column:1/-1;}
.info-item-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:3px;}
.info-item-value{font-size:13px;font-weight:600;color:var(--text);}

/* ══ 타임라인 ══ */
.timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:14px;position:relative;padding-bottom:16px;}
.timeline-item:not(:last-child)::before{
  content:'';position:absolute;left:16px;top:32px;bottom:0;
  width:1px;background:var(--border);
}
.timeline-dot{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;border:2px solid;flex-shrink:0;
  background:var(--surface);
}
.timeline-content{flex:1;padding-top:4px;}
.timeline-title{font-size:13px;font-weight:700;color:var(--text);}
.timeline-time{font-size:11px;color:var(--text3);margin-top:2px;}

/* ══ 상태 버튼 흐름 ══ */
.status-flow{display:flex;gap:6px;flex-wrap:wrap;}
.status-step-btn{
  padding:8px 14px;border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;cursor:pointer;
  border:1.5px solid;transition:all var(--transition);
}
.status-step-btn.past{opacity:.4;}
.status-step-btn:hover{opacity:1;transform:scale(1.03);}

/* ══ 진행 바 ══ */
.progress-wrap{height:8px;background:var(--border);border-radius:20px;overflow:hidden;}
.progress-bar{height:100%;border-radius:20px;transition:width .5s ease;}
.progress-blue{background:var(--primary);}
.progress-green{background:var(--green);}
.progress-red{background:var(--red);}
.progress-yellow{background:var(--yellow);}

/* ══ 퀵 필터 ══ */
.qf-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.filter-search{
  flex:1;min-width:220px;position:relative;
}
.filter-search .search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--text3);pointer-events:none;
}
.filter-search input{
  width:100%;padding:9px 12px 9px 34px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;outline:none;background:var(--surface);
  transition:border-color var(--transition);
}
.filter-search input:focus{border-color:var(--primary);}
.filter-select{
  padding:9px 12px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:13px;
  background:var(--surface);color:var(--text);outline:none;
  cursor:pointer;
}
.quick-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.qf-btn .cnt{
  display:inline-block;
  background:rgba(0,0,0,.07);
  border-radius:10px;padding:1px 6px;
  font-size:10px;font-weight:700;margin-left:3px;
}
.qf-btn.active .cnt{background:rgba(255,255,255,.25);}
.qf-btn{
  padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text2);cursor:pointer;transition:all var(--transition);
}
.qf-btn:hover{border-color:var(--primary);color:var(--primary);}
.qf-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,.3);}

/* ══ 배치 정보 바 ══ */
.batch-bar{
  background:var(--primary-l);border:1px solid var(--primary-m);
  border-radius:var(--radius-sm);padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:14px;flex-wrap:wrap;
}
.batch-info{font-size:13px;font-weight:600;color:var(--primary);}

/* ══ 모달 ══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.45);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
  backdrop-filter:blur(3px);
  padding:20px;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border-radius:16px;
  width:100%;max-width:520px;max-height:90vh;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-xl);
  transform:scale(.95) translateY(10px);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal{transform:none;}
.modal.modal-lg{max-width:700px;}
.modal-header{
  padding:22px 24px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:15px;font-weight:700;color:var(--text);}
.modal-close{
  background:none;border:none;cursor:pointer;
  color:var(--text3);font-size:18px;padding:4px;
  border-radius:6px;transition:all var(--transition);
}
.modal-close:hover{background:var(--slate-l);color:var(--text);}
.modal-body{padding:24px;overflow-y:auto;flex:1;}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
  background:var(--slate-l);border-radius:0 0 16px 16px;
}

/* ══ 확인 다이얼로그 ══ */
.confirm-box{
  background:var(--surface);border-radius:16px;
  padding:28px 28px 24px;max-width:380px;width:100%;
  text-align:center;box-shadow:var(--shadow-xl);
}
.confirm-icon{font-size:40px;margin-bottom:14px;}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text);}
.confirm-msg{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.confirm-btns{display:flex;gap:8px;justify-content:center;}

const STORAGE_KEY = 'dental_portal_v5';
const SUPABASE_URL = 'https://cslygetvchxklyswqvrk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_et1E3k32ILwA3rv35Re2Lw_oxgYWonu';

// Supabase client (lazy load)
let supabaseClient = null;
async function getSupabase() {
  if (!supabaseClient) {
    try {
      // Supabase SDK v2 UMD: window.supabase.createClient
      const opts = {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false
        },
        global: {
          headers: {
            'X-Client-Info': 'dental-portal-v5'
          }
        }
      };
      if (window.supabase && typeof window.supabase.createClient === 'function') {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, opts);
      } else if (typeof window.createClient === 'function') {
        supabaseClient = window.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, opts);
      } else {
        console.warn('Supabase SDK 로드 안됨');
        supabaseClient = null;
      }
    } catch(e) {
      console.warn('Supabase 클라이언트 생성 실패:', e.message);
      supabaseClient = null;
    }
  }
  return supabaseClient;
}

// Supabase에서 데이터 로드
async function loadFromSupabase(table) {
  try {
    const sb = await getSupabase();
    if (!sb) throw new Error('Supabase 미연동');
    const { data, error } = await sb.from(table).select('*');
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.warn(`Supabase ${table} 로드 실패, localStorage 사용:`, e.message);
    return null;
  }
}

// Supabase에 데이터 저장 (upsert)
async function saveToSupabase(table, data) {
  try {
    const sb = await getSupabase();
    if (!sb) throw new Error('Supabase 미연동');
    // 배열 데이터는 개별 upsert
    if (Array.isArray(data)) {
      for (const item of data) {
        const { error } = await sb.from(table).upsert(item, { onConflict: 'id' });
        if (error) throw error;
      }
    } else {
      const { error } = await sb.from(table).upsert(data, { onConflict: 'id' });

      if (error) throw error;
    }
    return true;
  } catch (e) {
    console.warn(`Supabase ${table} 저장 실패:`, e.message);
    // RLS 오류 감지
    if (e.message && e.message.includes('row-level security')) {
      showToast('Supabase 권한 오류 (RLS) - localStorage에 저장됨', 'warn');
    }
    return false;
  }
}

// Supabase 연결 상태 확인
async function checkSupabaseConnection() {
  // SDK 로드 대기 (최대 5초)
  let waited = 0;
  while (!window.supabase?.createClient && !window.createClient && waited < 5000) {
    await new Promise(r => setTimeout(r, 200));
    waited += 200;
  }
  if (!window.supabase?.createClient && !window.createClient) {
    console.warn('⚠️ Supabase SDK 로드 실패 - localStorage 모드');
    return false;
  }
  try {
    const sb = await getSupabase();
    if (!sb) {
      console.warn('⚠️ Supabase 클라이언트 생성 실패');
      return false;
    }
    const { data, error } = await sb.from('clinics').select('id').limit(1);
    if (error) {
      console.warn('⚠️ Supabase 오류:', error.code, error.message);
      showToast('Supabase 오류: ' + error.message, 'warn');
      return false;
    }
    return true;
  } catch (e) {
    console.warn('⚠️ Supabase 연결 실패:', e.message);
    return false;
  }
}

// ── LOCAL STORAGE (오프라인 fallback) ──
function loadFromLocal(key, defaultValue) {
  try {
    const data = localStorage.getItem(STORAGE_KEY + '_' + key);
    return data ? JSON.parse(data) : defaultValue;
  } catch (e) {
    console.error('localStorage 읽기 오류:', e);
    return defaultValue;
  }
}

function saveToLocal(key, value) {
  try {
    localStorage.setItem(STORAGE_KEY + '_' + key, JSON.stringify(value));
  } catch (e) {
    console.error('localStorage 저장 오류:', e);
  }
}

// 데이터 변경 시 저장 (Supabase 우선, localStorage fallback)
async function autoSave(tableName, data) {
  // Supabase에 먼저 저장 시도
  if (isSupabaseConnected) {
    const saved = await saveToSupabase(tableName, data);
    if (saved) {
      console.log(`✅ Supabase ${tableName} 저장 완료`);
      return true;
    }
    // Supabase 실패 시 localStorage에 저장
    saveToLocal(tableName, data);
    showToast('Supabase 저장 실패, 로컬에 임시 저장됨', 'warn');
    return false;
  }
  
  // Supabase 연결 안 되면 localStorage에 저장
  saveToLocal(tableName, data);
  return true;
}

function generateCases(){
  const statuses=['working','design','making','ship','done','done','done','done'];
  const types=['싱글','브릿지','파샬','풀마우스'];
  const teeth=['11','12','13','14','15','16','17','21','22','24','25','26','36','37','46','47'];
  const cases=[];
  const now=new Date();
  for(let i=1;i<=60;i++){
    const clinic=CLINICS[Math.floor(Math.random()*CLINICS.length)];
    const product=PRODUCTS[Math.floor(Math.random()*PRODUCTS.length)];
    const status=statuses[Math.floor(Math.random()*statuses.length)];
    const daysAgo=Math.floor(Math.random()*30);
    const recv=new Date(now);recv.setDate(recv.getDate()-daysAgo);
    const ship=new Date(recv);ship.setDate(ship.getDate()+Math.floor(Math.random()*5+2));
    const drRate=clinic.discount_rate;  // 예: -10 (%)
    const base=product.selling_price;
    const final=Math.round(base * (1 + drRate / 100));  // -10% → 0.9배
    const toothNum = teeth[Math.floor(Math.random()*teeth.length)];
    cases.push({
      id:`case${String(i).padStart(3,'0')}`,
      case_number:`ERD-2026-${String(i).padStart(4,'0')}`,
      clinic_id:clinic.id,clinic_name:clinic.name,
      patient_name:`환자${i}`,
      tooth_number:toothNum,tooth_numbers:[toothNum],tooth_count:1,
      product_id:product.id,product_name:product.name,
      type:types[Math.floor(Math.random()*types.length)],
      price:product.selling_price,
      discount_rate:clinic.discount_rate,
      final_price:final,
      status,is_remake:Math.random()<.08,
      receive_date:recv.toISOString().slice(0,10),
      ship_date:ship.toISOString().slice(0,10),
      memo:Math.random()<.3?'빠른 작업 요청':'',
      history:[{status:'working',changed_at:recv.toISOString(),changed_by:'관리자'}],
      created_at:recv.toISOString(),
    });

  }
  return cases;
}

function generateProductionLog(){
  const log=[];
  const now=new Date();
  CASES.filter(c=>c.status==='done').forEach((c,i)=>{
    const d=new Date(c.receive_date);d.setDate(d.getDate()+2);
    log.push({
      id:`pl${String(i+1).padStart(3,'0')}`,
      case_id:c.id,product_id:c.product_id,product_name:c.product_name,
      clinic_id:c.clinic_id,clinic_name:c.clinic_name,

    });

  });

  return log;
}

const MAX_ATTEMPTS=5;

// 세션 관리: 저장/확인/만료
function saveSession(user) {
  const sessionData = {
    user: user,
    timestamp: Date.now()
  };
  localStorage.setItem('dental_session', JSON.stringify(sessionData));
}

function checkSession() {
  try {
    const sessionStr = localStorage.getItem('dental_session');
    if (!sessionStr) return null;
    
    const session = JSON.parse(sessionStr);
    const elapsed = Date.now() - session.timestamp;
    
    // 세션 만료 확인
    if (elapsed > SESSION_DURATION_MS) {
      localStorage.removeItem('dental_session');
      return null;
    }
    return session.user;
  } catch (e) {
    return null;
  }
}

function clearSession() {
  localStorage.removeItem('dental_session');
}

// quickLogin 제거됨 (보안)

async function doLogin(){
  if (!isDataReady) {showLoginError('데이터 로딩 중... 잠시 후 시도하세요.');return;}
  if(loginAttempts>=MAX_ATTEMPTS){showLoginError('5회 이상 실패. 잠시 후 다시 시도해주세요.');return;}
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  const btn=document.getElementById('loginBtn');
  if(!id||!pw){showLoginError('아이디와 비밀번호를 입력하세요.');return;}
  btn.classList.add('loading');
  
  // 사용자 찾기
  const user = USERS.find(u => u.username === id);
  if (!user) {
    btn.classList.remove('loading');
    loginAttempts++;
    const remain = MAX_ATTEMPTS - loginAttempts;
    showLoginError(`아이디 또는 비밀번호가 올바르지 않습니다. (${remain}회 남음)`);
    return;
  }
  
  // 비밀번호 검증 (해시 비교 또는 일반 비교)
  let isValid = false;
  if (user.password_hash) {
    isValid = await verifyPassword(pw, user.password_hash);
  } else {
    // 기존 일반 비밀번호 (하위 호환)
    isValid = (user.password === pw);
  }
  
  btn.classList.remove('loading');
  if (isValid) {
    loginAttempts = 0;
    localStorage.removeItem('_login_attempts');
    localStorage.removeItem('_login_locktime');
    currentUser = {...user};
    // 비밀번호 관련 필드 모두 제거
    delete currentUser.password;
    delete currentUser.password_hash;
    // 세션 저장 안 함 — 브라우저 닫으면 무조건 재로그인
    initApp();
  } else {
    loginAttempts++;
    localStorage.setItem('_login_attempts', loginAttempts);
    if(loginAttempts >= MAX_ATTEMPTS) localStorage.setItem('_login_locktime', Date.now());
    const remain = MAX_ATTEMPTS - loginAttempts;
    showLoginError(`아이디 또는 비밀번호가 올바르지 않습니다. (${remain}회 남음)`);
  }
}

// 비밀번호 해시화 (SHA-256 via Web Crypto API)
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + 'dental_salt_2026');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// 비밀번호 검증
async function verifyPassword(password, hashedPassword) {
  const hash = await hashPassword(password);
  return hash === hashedPassword;
}

// XSS 방지: HTML 이스케이프 함수
function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// 숫자만 추출 (입력 검증용)
function parseNumber(str) {
  const n = parseInt(String(str).replace(/[^0-9-]/g, ''), 10);
  return isNaN(n) ? 0 : n;
}

function setDashFilter(f){
  dashFilter=f;dashPage=1;
  document.querySelectorAll('.qf-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.qf===f||(f==='all'&&b.dataset.qf==='all'));
  });

  renderCaseTable();
}

function renderCaseTable(){
  const isAdmin=currentUser.role==='admin';
  let cases=CASES;
  if(!isAdmin) cases=cases.filter(c=>c.clinic_id===currentUser.clinic_id);
  
  const search=document.getElementById('dashSearchInput')?.value.toLowerCase()||'';
  const clinicF=document.getElementById('dashClinicFilter')?.value||'';
  
  if(dashFilter==='remake') cases=cases.filter(c=>c.is_remake);
  else if(dashFilter!=='all') cases=cases.filter(c=>c.status===dashFilter);
  if(search) cases=cases.filter(c=>{
  const teeth = c.tooth_numbers || c.tooth_number || '';
  return (c.patient_name+teeth+c.clinic_name).toLowerCase().includes(search);
});

  if(clinicF) cases=cases.filter(c=>c.clinic_id===clinicF);
  
  cases.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  
  const total=cases.length;
  const pages=Math.ceil(total/DASH_PER_PAGE);
  const paged=cases.slice((dashPage-1)*DASH_PER_PAGE,dashPage*DASH_PER_PAGE);
  
  // Batch bar
  const bb=document.getElementById('batchBar');
  if(dashSelectedIds.size>0&&isAdmin){
    bb.className='batch-bar';

    <div class="batch-actions">
      ${['working','design','making','ship','done'].map(s=>`<button class="batch-select-btn" onclick="batchChangeStatus('${s}')">${statusLabel(s)}</button>`).join('')}
      <button class="batch-close-btn" onclick="dashSelectedIds.clear();renderCaseTable()">✕</button>
    </div>`;
  } else {bb.className='hidden';}
  
  const wrap=document.getElementById('caseTableWrap');
  if(!paged.length){wrap.innerHTML=`<div style="text-align:center;padding:48px;color:var(--text3);">🔍 검색 결과가 없습니다</div>`;return;}
  
  wrap.innerHTML=`
  <div class="table-wrap">
  <table class="table">
    <thead><tr>
      ${isAdmin?'<th style="width:36px;"><input type="checkbox" onchange="toggleAllCheck(this)"></th>':''}

      <th>거래처</th>
      <th>환자</th>
      <th>보철명</th>
      <th>치아</th>
      <th>단가</th>
      <th>📷</th>
      <th>상태</th>
      <th>납기일</th>
      <th></th>
    </tr></thead>
    <tbody>
    ${paged.map(c=>`
    <tr class="${dashSelectedIds.has(c.id)?'selected':''}" style="cursor:pointer;" onclick="openCaseDetail('${c.id}')">
      ${isAdmin?`<td onclick="event.stopPropagation()"><input type="checkbox" ${dashSelectedIds.has(c.id)?'checked':''} onchange="toggleCaseCheck('${c.id}',this)"></td>`:''}
      <td><span class="font-mono" style="font-size:11px;color:var(--text3);">${c.case_number}</span>${c.is_remake?` <span class="tag" style="background:var(--red-l);color:var(--red);">리메이크</span>`:''}</td>
      <td><span style="font-weight:600;">${c.clinic_name}</span></td>
      <td>${c.patient_name}</td>
      <td>${c.product_name}</td>
      <td><span class="font-mono">#${formatToothNumbers(c.tooth_numbers||c.tooth_number)}</span>${c.tooth_count>1?`<span class="tag" style="background:var(--blue-l);color:var(--blue);margin-left:4px;">${c.tooth_count}개</span>`:''}</td>
      <td class="font-mono">${fmt(c.final_price)}${c.tooth_count>1?`<div style="font-size:10px;color:var(--text3);">(${fmt(c.price)}×${c.tooth_count})</div>`:''}</td>
      <td style="text-align:center;">
        ${(c.photos&&c.photos.length>0)
          ? `<button class="photo-icon-btn has-photo" onclick="event.stopPropagation();openPhotoViewer('${c.id}',0)" title="${c.photos.length}장">📷<div style="font-size:9px;color:var(--blue);">${c.photos.length}장</div></button>`

      <td><span class="badge badge-${c.status}">${statusLabel(c.status)}</span></td>
      <td style="color:${isOverdue(c)?'var(--red)':'var(--text2)'};font-weight:${isOverdue(c)?700:400};">${c.ship_date}${isOverdue(c)?' ⚠️':''}</td>
      <td onclick="event.stopPropagation()">
        ${isAdmin?`<button class="btn btn-ghost btn-icon btn-sm" onclick="openCaseDetail('${c.id}')">›</button>`:`<button class="btn btn-secondary btn-xs" onclick="openCaseDetail('${c.id}')">보기</button>`}

function isOverdue(c){return c.status!=='done'&&new Date(c.ship_date)<new Date();}

function toggleCaseCheck(id,cb){if(cb.checked)dashSelectedIds.add(id);else dashSelectedIds.delete(id);renderCaseTable();}
function toggleAllCheck(cb){const visible=document.querySelectorAll('tbody tr');visible.forEach(tr=>{const id=tr.querySelector('input[type=checkbox]')?.closest('td')?.nextElementSibling?.previousElementSibling;});

  // Re-scan current page
  const paged=getPagedCases();
  if(cb.checked) paged.forEach(c=>dashSelectedIds.add(c.id));
  else paged.forEach(c=>dashSelectedIds.delete(c.id));
  renderCaseTable();
}
function getPagedCases(){
  let cases=CASES;
  if(dashFilter==='remake') cases=cases.filter(c=>c.is_remake);
  else if(dashFilter!=='all') cases=cases.filter(c=>c.status===dashFilter);
  cases.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return cases.slice((dashPage-1)*DASH_PER_PAGE,dashPage*DASH_PER_PAGE);
}
async function batchChangeStatus(status){
  const count=dashSelectedIds.size;
  dashSelectedIds.forEach(id=>{const c=CASES.find(x=>x.id===id);if(c){c.status=status;c.history.push({status,changed_at:new Date().toISOString(),changed_by:currentUser.name});}});

  dashSelectedIds.clear();
  await autoSave('cases', CASES);  // Supabase + localStorage에 저장
  renderCaseTable();
  showToast(`${count}개 케이스 → ${statusLabel(status)} 변경 완료`,'success');
}

async function changeCaseStatus(id,status){
  const c=CASES.find(x=>x.id===id);
  if(!c)return;
  c.status=status;
  c.history.push({status,changed_at:new Date().toISOString(),changed_by:currentUser.name});

  if(status==='done'){
    const product=PRODUCTS.find(p=>p.id===c.product_id);
    PRODUCTION_LOG.push({id:`pl_${Date.now()}`,case_id:c.id,product_id:c.product_id,product_name:c.product_name,clinic_id:c.clinic_id,clinic_name:c.clinic_name,quantity:1,selling_price:c.price,material_cost:product?.material_cost||0,final_price:c.final_price,production_date:new Date().toISOString().slice(0,10)});

    autoSave();  // PRODUCTION_LOG 저장
  }
  await autoSave('cases', CASES);
  openCaseDetail(id);
  renderDashboard();
  showToast(`상태가 "${statusLabel(status)}"으로 변경되었습니다.`,'success');
}
async function deleteCase(id){
  showConfirm('케이스 삭제','정말 이 케이스를 삭제하시겠습니까?',async ()=>{
    CASES=CASES.filter(c=>c.id!==id);
    await autoSave('cases', CASES);
    closeDetailPanel();renderDashboard();
    showToast('케이스가 삭제되었습니다.','success');
  });

}

function renderToothSelector(selectedTeeth=[]){
  const container=document.getElementById('toothSelector');
  const hiddenInput=document.getElementById('cm_tooth');
  if(!container)return;
  
  const toArr = Array.isArray(selectedTeeth) ? selectedTeeth : parseToothNumbers(selectedTeeth);
  
  const renderQuadrant=(title,teeth)=>`
    <div class="tooth-section">
      <div class="tooth-section-title">${title}</div>
      <div class="tooth-grid">
        ${teeth.map(t=>`
          <button type="button" class="tooth-btn ${MOLAR_NUMBERS.includes(t)?'molar':''} ${toArr.includes(String(t))?'selected':''}" 
            data-tooth="${t}" onclick="toggleTooth(${t})">${t}</button>
        `).join('')}
      </div>
    </div>`;
  
  container.innerHTML=`
    <div class="tooth-quadrant">
      <div class="tooth-row">
        ${renderQuadrant('상단 (우) 18 17 16 15 14 13 12 11',[...TOOTH_DATA.upperRight].reverse())}
        ${renderQuadrant('상단 (좌) 21 22 23 24 25 26 27 28',TOOTH_DATA.upperLeft)}
      </div>
      <div class="tooth-row">
        ${renderQuadrant('하단 (우) 41 42 43 44 45 46 47 48',TOOTH_DATA.lowerRight)}
        ${renderQuadrant('하단 (좌) 38 37 36 35 34 33 32 31',[...TOOTH_DATA.lowerLeft].reverse())}
      </div>
    </div>`;
  
  updateToothDisplay(toArr);
}

function toggleTooth(toothNum){
  let selected=document.getElementById('cm_tooth').value;
  let arr=selected?selected.split(',').filter(t=>t):[];
  const idx=arr.indexOf(String(toothNum));
  if(idx>-1)arr.splice(idx,1);
  else arr.push(toothNum);
  arr.sort((a,b)=>parseInt(a)-parseInt(b));
  document.getElementById('cm_tooth').value=arr.join(',');
  
  document.querySelectorAll('.tooth-btn').forEach(btn=>{
    const t=parseInt(btn.dataset.tooth);
    btn.classList.toggle('selected',arr.includes(String(t)));
  });

  
  updateToothDisplay(arr);
  updateCasePrice();
}

function updateToothDisplay(selectedTeeth){
  const list=document.getElementById('toothSelectedList');
  if(!list)return;
  const arr=Array.isArray(selectedTeeth)?selectedTeeth:(selectedTeeth?selectedTeeth.split(','):[]);
  if(arr.length===0){
    list.innerHTML='<span style="color:var(--text3);font-size:12px;">치를 선택하세요</span>';
    return;
  }
  list.innerHTML=arr.map(t=>`
    <span class="tooth-chip">${t}<button type="button" class="tooth-chip-remove" onclick="removeTooth(${t})">×</button></span>

function clearAllTeeth(){

function parseToothNumbers(toothStr){
  if(!toothStr)return[];
  return toothStr.split(',').map(t=>t.trim()).filter(t=>t);
}

function formatToothNumbers(toothData){
  if(!toothData)return'-';
  const arr=Array.isArray(toothData)?toothData:String(toothData).split(',').map(t=>t.trim()).filter(t=>t);
  if(arr.length===0)return'-';
  if(arr.length===1)return arr[0];
  return arr.join(', ');
}
// 거래처별 단가 가져오기
// custom_prices[id] = { type:'amount'|'percent', value:숫자 }
function getClinicPrice(clinic, product) {
  if (!clinic || !product) return 0;
  const custom = clinic.custom_prices?.[product.id];
  if (custom) {
    if (custom.type === 'amount' && custom.value > 0) {
      return custom.value; // 금액 직접 지정
    }
    if (custom.type === 'percent') {
      // % 조정 (기본단가 기준)
      return Math.round(product.selling_price * (1 + custom.value / 100));
    }
  }
  // 기본: 거래처 할인율 적용
  const dr = (clinic.discount_rate || 0) / 100;
  return Math.round(product.selling_price * (1 + dr));
}

// 단가 설명 텍스트 (미리보기용)
function getClinicPriceLabel(clinic, product) {
  if (!clinic || !product) return '';
  const custom = clinic.custom_prices?.[product.id];
  if (custom?.type === 'amount' && custom.value > 0) return '★ 개별금액';
  if (custom?.type === 'percent') return `★ ${custom.value >= 0 ? '+' : ''}${custom.value}% 조정`;
  return `할인율 ${clinic.discount_rate || 0}%`;
}

function updateCasePrice(){
  const sel = document.getElementById('cm_product')?.value;
  const clinicId = document.getElementById('cm_clinic')?.value;
  const p = PRODUCTS.find(x=>x.id===sel);
  const cl = CLINICS.find(x=>x.id===clinicId);
  const preview = document.getElementById('cm_price_preview');
  if(!preview)return;
  if(!p){preview.innerHTML='';return;}
  
  const toothValue = document.getElementById('cm_tooth').value;
  const toothCount = toothValue ? toothValue.split(',').filter(t=>t).length : 0;
  const unitFinal = getClinicPrice(cl, p);
  const totalFinal = unitFinal * (toothCount || 1);
  const priceLabel = getClinicPriceLabel(cl, p);
  const isCustom = cl?.custom_prices?.[p.id];

  if(toothCount > 1){
    preview.innerHTML = `💰 단가: <b class="font-mono">${fmt(unitFinal)}</b> × <b>${toothCount}개</b> = <b class="font-mono" style="color:var(--blue);font-size:15px;">${fmt(totalFinal)}</b> <span style="color:${isCustom?'var(--green)':'var(--text3)'};font-size:11px;">${priceLabel}</span>`;
  } else {
    preview.innerHTML = `💰 기본단가: <b class="font-mono">${fmt(p.selling_price)}</b> · 최종: <b class="font-mono" style="color:var(--blue);">${fmt(unitFinal)}</b> <span style="color:${isCustom?'var(--green)':'var(--text3)'};font-size:11px;">${priceLabel}</span>`;
  }
}
async function saveCaseModal(editId){
  const clinicId = document.getElementById('cm_clinic').value;

  if(/[<>\"\'&]/.test(patient)) {showToast('患者명에 특수문자는 사용할 수 없습니다.','error');return;}
  
  const clinic = CLINICS.find(c=>c.id===clinicId);

function calcBEP(yearMonth){
  const prodInMonth=PRODUCTION_LOG.filter(l=>l.production_date.startsWith(yearMonth));
  const fc=calcMonthlyFixedCosts(yearMonth);
  
  if(!prodInMonth.length){
    return {isValid:true,fixedCosts:fc,weightedSellingPrice:0,weightedMaterialCost:0,contributionMargin:0,contributionMarginRatio:0,bepQuantity:0,bepRevenue:0,currentQuantity:0,currentRevenue:0,currentMaterialCost:0,currentContribution:0,netProfit:-fc,achievementRate:0,neededQuantity:0,status:'loss'};
  }
  
  let totalRevenue=0,totalMaterialCost=0,totalQty=0;
  prodInMonth.forEach(l=>{
    totalRevenue+=l.selling_price*l.quantity;
    totalMaterialCost+=l.material_cost*l.quantity;
    totalQty+=l.quantity;
  });

  
  const wsp=totalRevenue/totalQty;
  const wmc=totalMaterialCost/totalQty;
  const cm=wsp-wmc;
  const cmr=(cm/wsp)*100;
  
  if(cm<=0) return {isValid:false,errorMessage:'공헌이익 0 이하',contributionMargin:cm,achievementRate:0,status:'loss',netProfit:-fc,currentQuantity:totalQty,currentRevenue:totalRevenue,currentMaterialCost:totalMaterialCost,currentContribution:0,bepQuantity:Infinity,bepRevenue:Infinity,weightedSellingPrice:Math.round(wsp),weightedMaterialCost:Math.round(wmc),contributionMarginRatio:cmr,neededQuantity:Infinity,fixedCosts:fc};
  
  const bepQty=fc>0?Math.ceil(fc/cm):0;
  const bepRev=bepQty*wsp;
  const contrib=totalRevenue-totalMaterialCost;
  const netProfit=contrib-fc;
  const ar=bepQty>0?(totalQty/bepQty*100):100;
  const needed=netProfit<0?Math.ceil(-netProfit/cm):0;
  const status=Math.abs(netProfit)<1000?'breakeven':netProfit>0?'profit':'loss';
  
  return {isValid:true,fixedCosts:fc,weightedSellingPrice:Math.round(wsp),weightedMaterialCost:Math.round(wmc),contributionMargin:Math.round(cm),contributionMarginRatio:Math.round(cmr*10)/10,bepQuantity:bepQty,bepRevenue:Math.round(bepRev),currentQuantity:totalQty,currentRevenue:Math.round(totalRevenue),currentMaterialCost:Math.round(totalMaterialCost),currentContribution:Math.round(contrib),netProfit:Math.round(netProfit),achievementRate:Math.round(ar*10)/10,neededQuantity:needed,status};
}

function calcMonthlyFixedCosts(yearMonth){
  const [y,m]=yearMonth.split('-').map(Number);
  const target=new Date(y,m-1,1);
  return FIXED_COSTS.filter(f=>!f.is_deleted&&f.is_active).reduce((sum,f)=>{
    const start=new Date(f.start_date);
    const end=f.end_date?new Date(f.end_date):new Date(2099,11,31);
    return (target>=start&&target<=end)?sum+f.amount:sum;
  },0);
}
function getMonthFixedCostItems(yearMonth){
  const [y,m]=yearMonth.split('-').map(Number);
  const target=new Date(y,m-1,1);
  return FIXED_COSTS.filter(f=>{
    if(f.is_deleted||!f.is_active)return false;
    const start=new Date(f.start_date);
    const end=f.end_date?new Date(f.end_date):new Date(2099,11,31);
    return target>=start&&target<=end;
  });

}

function drawBEPTrendChart(){
  const ctx=document.getElementById('bepTrendChart');
  if(!ctx)return;
  const months=[];const base=new Date(bepMonth+'-01');
  for(let i=5;i>=0;i--){const d=new Date(base);d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const revenues=months.map(m=>PRODUCTION_LOG.filter(l=>l.production_date.startsWith(m)).reduce((s,l)=>s+l.final_price*l.quantity,0)/10000);
  const fcList=months.map(m=>calcMonthlyFixedCosts(m)/10000);
  const profits=months.map((m,i)=>{const bep=calcBEP(m);return bep.netProfit/10000;});

  
  if(window._bepChart) window._bepChart.destroy();
  window._bepChart=new Chart(ctx,{
    type:'bar',
    data:{labels:months,datasets:[

async function saveFCModal(editId){
  const name=document.getElementById('fc_name').value.trim();
  const amount=parseInt(document.getElementById('fc_amount').value);
  const start=document.getElementById('fc_start').value;
  const end=document.getElementById('fc_end').value||null;
  if(!name||!amount||!start){showToast('필수 항목을 입력하세요.','error');return;}
  if(amount<=0){showToast('금액은 0보다 커야 합니다.','error');return;}
  if(end&&end<start){showToast('종료일은 시작일 이후여야 합니다.','error');return;}
  
  if(editId){
    const f=FIXED_COSTS.find(x=>x.id===editId);
    Object.assign(f,{name,amount,category:document.getElementById('fc_category').value,start_date:start,end_date:end,memo:document.getElementById('fc_memo').value});

    showToast('고정비가 수정되었습니다.','success');

    showToast('고정비가 추가되었습니다.','success');

  await autoSave('fixed_costs', FIXED_COSTS);
  closeModal();renderFixedCosts();
}

}

function openProductModal(id=null){
  const p=id?PRODUCTS.find(x=>x.id===id):null;

  <div class="form-group"><label>보철명 *</label><input class="input" id="pm_name" value="${p?.name||''}" placeholder="예: 지르코니아 크라운"></div>
  <div class="form-row">
    <div class="form-group"><label>판매단가 (원) *</label><input class="input" type="number" id="pm_sell" value="${p?.selling_price||''}" placeholder="60000" oninput="updateProductPreview()"></div>
    <div class="form-group"><label>재료원가 (원) *</label><input class="input" type="number" id="pm_cost" value="${p?.material_cost||''}" placeholder="18000" oninput="updateProductPreview()"></div>
  </div>
  <div class="form-group"><label>단위</label><input class="input" id="pm_unit" value="${p?.unit||'개'}" placeholder="개"></div>

   <button class="btn btn-primary" onclick="saveProductModal('${id||''}')">💾 저장</button>`);

function updateProductPreview(){
  const sell=parseInt(document.getElementById('pm_sell')?.value)||0;
  const cost=parseInt(document.getElementById('pm_cost')?.value)||0;
  const prev=document.getElementById('pm_preview');
  if(!prev)return;
  if(!sell){prev.innerHTML='';return;}
  const cm=sell-cost;const cmr=sell>0?(cm/sell*100).toFixed(1):0;
  const ok=cm>0;
  prev.style.background=ok?'var(--green-l)':'var(--red-l)';
  prev.style.borderColor=ok?'#86efac':'#fca5a5';
  prev.innerHTML=ok?`✅ 공헌이익 <b class="font-mono">${fmt(cm)}</b> · 공헌이익률 <b>${cmr}%</b>`:`❌ 원가가 판매가보다 크거나 같습니다.`;

async function saveProductModal(editId){
  const name=document.getElementById('pm_name').value.trim();
  const sell=parseInt(document.getElementById('pm_sell').value);
  const cost=parseInt(document.getElementById('pm_cost').value);
  if(!name||!sell||isNaN(cost)){showToast('필수 항목을 입력하세요.','error');return;}
  if(sell<=0){showToast('판매단가는 0보다 커야 합니다.','error');return;}
  if(cost<0){showToast('재료원가는 0 이상이어야 합니다.','error');return;}
  if(cost>=sell){showToast('재료원가는 판매단가보다 작아야 합니다.','error');return;}
  if(editId){
    const p=PRODUCTS.find(x=>x.id===editId);
    Object.assign(p,{name,selling_price:sell,material_cost:cost,unit:document.getElementById('pm_unit').value});

    showToast('보철 정보가 수정되었습니다.','success');
  } else {
    PRODUCTS.push({id:`p${Date.now()}`,name,selling_price:sell,material_cost:cost,unit:document.getElementById('pm_unit').value||'개',is_active:true,is_deleted:false});

    showToast('보철이 추가되었습니다.','success');

  await autoSave('products', PRODUCTS);
  closeModal();renderProducts();

async function deleteProduct(id){
  showConfirm('보철 삭제','이 보철 정보를 삭제하시겠습니까?',async ()=>{
    const p=PRODUCTS.find(x=>x.id===id);if(p){p.is_deleted=true;p.is_active=false;}
    await autoSave('products', PRODUCTS);

// 거래처별 보철 개별 단가 설정
function openClinicPriceModal(clinicId) {
  const clinic = CLINICS.find(c => c.id === clinicId);
  if (!clinic) return;
  if (!clinic.custom_prices) clinic.custom_prices = {};

  const activeProducts = PRODUCTS.filter(p => !p.is_deleted && p.is_active);

  const rows = activeProducts.map(p => {
    const custom = clinic.custom_prices[p.id] || {};
    // 저장된 값: amount 타입이면 금액, 없으면 빈칸
    const savedAmt = (custom.type === 'amount' && custom.value > 0) ? custom.value : '';
    const defPrice = Math.round(p.selling_price * (1 + (clinic.discount_rate||0)/100));
    const isCustom = savedAmt !== '';

    return `
    <tr style="border-bottom:0.5px solid var(--border);">
      <td style="padding:10px 8px;font-weight:600;font-size:13px;">${p.name}</td>
      <td style="padding:10px 8px;font-size:12px;color:var(--text3);text-align:right;">${fmt(p.selling_price)}</td>
      <td style="padding:10px 8px;font-size:12px;text-align:right;">
        <span id="cp_preview_${p.id}" style="font-weight:600;color:${isCustom?'var(--blue)':'var(--text2)'};">
          ${fmt(isCustom ? savedAmt : defPrice)}
        </span>
        ${isCustom ? '<span style="font-size:10px;color:var(--green);margin-left:3px;">개별</span>' : ''}
      </td>
      <td style="padding:10px 8px;">
        <input class="input" type="number"
          id="cp_amt_${p.id}"
          value="${savedAmt}"
          placeholder="${defPrice.toLocaleString('ko-KR')} (기본)"
          style="width:130px;padding:6px 10px;font-size:13px;text-align:right;"
          min="0" step="1000"
          oninput="previewClinicPrice('${p.id}','${defPrice}')">
      </td>
    </tr>`;
  }).join('');

  openModal(`💰 ${clinic.name} — 보철별 단가 설정`, `
    <div style="font-size:12px;padding:8px 12px;background:var(--blue-l);border-radius:8px;margin-bottom:12px;color:var(--blue);line-height:1.7;">
      원하는 금액을 직접 입력하세요. <b>비워두면 기본 할인율(${clinic.discount_rate||0}%) 자동 적용</b>됩니다.
    </div>
    <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);">
          <th style="padding:6px 8px;text-align:left;">보철명</th>
          <th style="padding:6px 8px;text-align:right;">기본단가</th>
          <th style="padding:6px 8px;text-align:right;">적용단가</th>
          <th style="padding:6px 8px;text-align:right;">이 거래처 단가 입력</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="saveClinicPrices('${clinicId}')">💾 저장</button>
  `, true);
}

function previewClinicPrice(productId, defPrice) {
  const input = document.getElementById(`cp_amt_${productId}`);
  const preview = document.getElementById(`cp_preview_${productId}`);
  if (!preview) return;
  const val = parseInt(input?.value);
  if (val > 0) {
    preview.style.color = 'var(--blue)';
    preview.textContent = val.toLocaleString('ko-KR') + '원';
    // 개별 표시
    let badge = preview.nextElementSibling;
    if (!badge || !badge.textContent.includes('개별')) {
      preview.insertAdjacentHTML('afterend', '<span style="font-size:10px;color:var(--green);margin-left:3px;">개별</span>');
    }
  } else {
    preview.style.color = 'var(--text2)';
    preview.textContent = parseInt(defPrice).toLocaleString('ko-KR') + '원';
    const badge = preview.nextElementSibling;
    if (badge && badge.textContent.includes('개별')) badge.remove();
  }
}

async function saveClinicPrices(clinicId) {
  const clinic = CLINICS.find(c => c.id === clinicId);
  if (!clinic) return;
  if (!clinic.custom_prices) clinic.custom_prices = {};

  const activeProducts = PRODUCTS.filter(p => !p.is_deleted && p.is_active);
  let changed = 0;

  activeProducts.forEach(p => {
    const input = document.getElementById(`cp_amt_${p.id}`);
    const val = parseInt(input?.value);
    if (val > 0) {
      clinic.custom_prices[p.id] = { type: 'amount', value: val };
      changed++;
    } else {
      delete clinic.custom_prices[p.id]; // 비워두면 기본값
    }
  });

  await autoSave('clinics', CLINICS);
  closeModal();
  showToast(`${clinic.name} 단가 저장 완료 (개별설정 ${changed}개)`, 'success');
  renderClinics();
}

    <label>할인율 % <small style="color:var(--text3);">(-99 ~ +99, 음수=할인, 양수=할증)</small></label>
    <input class="input" type="number" id="cl_discount" value="${c?.discount_rate||0}" min="-99" max="99" step="1" oninput="updateClinicPreview()">
  </div>
  <div id="cl_preview" style="background:var(--blue-l);border-radius:8px;padding:10px 14px;font-size:13px;"></div>
  `,
  `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
   <button class="btn btn-primary" onclick="saveClinicModal('${id||''}')">💾 저장</button>`);
  updateClinicPreview();
}
function updateClinicPreview(){
  const dr=parseFloat(document.getElementById('cl_discount')?.value)||0;
  const prev=document.getElementById('cl_preview');
  if(!prev)return;
  const example=60000;const final=Math.round(example*(1+dr/100));
  prev.innerHTML=`💡 예시: 지르코니아 ${fmt(example)} → <b class="font-mono">${fmt(final)}</b> (${dr>0?'+':''}${dr}% 적용)`;
}
async function saveClinicModal(editId){
  const name=document.getElementById('cl_name').value.trim();
  if(!name){showToast('거래처명을 입력하세요.','error');return;}
  const dr=parseFloat(document.getElementById('cl_discount').value)||0;
  if(dr<-99||dr>99){showToast('할인율은 -99% ~ +99% 범위여야 합니다.','error');return;}
  
  const owner=document.getElementById('cl_owner').value;
  const phone=document.getElementById('cl_phone').value;
  const email=document.getElementById('cl_email').value;
  const address=document.getElementById('cl_address').value;
  
  if(editId){
    const c=CLINICS.find(x=>x.id===editId);
    Object.assign(c,{name,owner,owner_name:owner,phone,email,address,discount_rate:dr});
    if (!c.custom_prices) c.custom_prices = {};

    
    CASES.filter(cs=>cs.clinic_id===editId).forEach(cs=>{
      cs.clinic_name=name;
    });

    showToast('거래처 정보가 수정되었습니다.','success');
  } else {
    CLINICS.push({id:`c${Date.now()}`,name,owner,owner_name:owner,phone,email,address,discount_rate:dr,is_active:true,custom_prices:{}});

    showToast('거래처가 추가되었습니다.','success');
  }
  await autoSave('clinics', CLINICS);
  await autoSave('cases', CASES);
  closeModal();renderClinics();
}

// 치과 사용자 - 설정에서 자기 거래처 정보 저장
async function saveClinicSettings(clinicId){
  const name    = document.getElementById('cl_set_name')?.value.trim();
  const owner   = document.getElementById('cl_set_owner')?.value.trim();
  const phone   = document.getElementById('cl_set_phone')?.value.trim();
  const email   = document.getElementById('cl_set_email')?.value.trim();
  const address = document.getElementById('cl_set_address')?.value.trim();

  if(!name){ showToast('치과명을 입력하세요.','error'); return; }

  const clinic = CLINICS.find(c => c.id === clinicId);
  if(!clinic){ showToast('거래처 정보를 찾을 수 없습니다.','error'); return; }

  // 할인율은 건드리지 않음 (관리자 전용)
  Object.assign(clinic, { name, owner, phone, email, address });

  // 연결된 케이스의 clinic_name도 동기화
  CASES.forEach(c => {
    if(c.clinic_id === clinicId) c.clinic_name = name;
  });

  await autoSave('users', USERS);
  await autoSave('clinics', CLINICS);
  showToast('치과 정보가 저장되었습니다.','success');
  renderSettings();
}

async function saveMySettings(){
  const name = document.getElementById('settings_name').value.trim();
  const email = document.getElementById('settings_email').value.trim();
  const password = document.getElementById('settings_password').value;
  const passwordConfirm = document.getElementById('settings_password_confirm')?.value || '';
  const username = document.getElementById('settings_username')?.value.trim();
  
  if(!name || !email || !username){showToast('아이디, 이름, 이메일을 모두 입력하세요.','error');return;}
  
  // 비밀번호 변경 시 확인 검증
  if(password && password !== passwordConfirm){
    showToast('비밀번호가 일치하지 않습니다.','error');return;
  }
  if(password && password.length < 6){
    showToast('비밀번호는 6자 이상이어야 합니다.','error');return;
  }
  
  const existingUser = USERS.find(u=>u.username === username && u.id !== currentUser.id);
  if(existingUser){showToast('이미 사용 중인 아이디입니다.','error');return;}
  
  const userIdx = USERS.findIndex(u=>u.id === currentUser.id);
  if(userIdx > -1){
    USERS[userIdx].name = name;
    USERS[userIdx].email = email;
    USERS[userIdx].username = username;
    currentUser.username = username;
    if(password){
      hashPassword(password).then(hash => {
        USERS[userIdx].password_hash = hash;
        delete USERS[userIdx].password;
      });
    }
    currentUser.name = name;
    currentUser.email = email;
    if(password){
      showToast('모든 정보가 변경되었습니다.','success');
    } else {
      showToast('정보가 변경되었습니다.','success');
    }
    await autoSave('users', USERS);
    document.getElementById('sidebarName').textContent = currentUser.name;
    document.getElementById('settings_password').value = '';
    renderSettings();
  }
}

async function saveUserModal(userId){
  const username = document.getElementById('um_username').value.trim();
  const password = document.getElementById('um_password').value;
  const passwordConfirm = document.getElementById('um_password_confirm')?.value || '';
  const name = document.getElementById('um_name').value.trim();
  const email = document.getElementById('um_email').value.trim();
  const role = document.getElementById('um_role').value;
  const clinicId = document.getElementById('um_clinic_id')?.value || null;

  if(!username || !name || !email){showToast('필수 항목을 입력하세요.','error');return;}
  if(!userId && !password){showToast('신규 사용자는 비밀번호를 입력하세요.','error');return;}
  if(password && password.length < 6){showToast('비밀번호는 6자 이상이어야 합니다.','error');return;}
  if(password && password !== passwordConfirm){showToast('비밀번호가 일치하지 않습니다.','error');return;}

  // 이메일 형식 검증
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(email && !emailRegex.test(email)){showToast('이메일 형식이 올바르지 않습니다.','error');return;}

  // 아이디 중복 체크
  const dup = USERS.find(u => u.username === username && u.id !== userId);
  if(dup){showToast('이미 사용 중인 아이디입니다.','error');return;}

  if(userId){
    const idx = USERS.findIndex(u=>u.id===userId);
    if(idx>-1){
      USERS[idx].name = name;
      USERS[idx].email = email;
      USERS[idx].role = role;
      if(clinicId !== null) USERS[idx].clinic_id = clinicId || null;
      if(password){
        const hash = await hashPassword(password);
        USERS[idx].password_hash = hash;
        delete USERS[idx].password;
      }
      showToast('사용자 정보가 수정되었습니다.','success');
    }
  } else {
    const hash = await hashPassword(password);
    const id = 'u' + Date.now();
    USERS.push({id, username, password_hash:hash, name, email, role, clinic_id:clinicId||null});
    showToast('사용자가 추가되었습니다.','success');
  }
  await autoSave('users', USERS);
  closeModal();
  renderSettings();
}

  if(!file){ showToast('파일을 선택하세요.','error'); return; }

  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.cases || !data.users){ showToast('올바른 백업 파일이 아닙니다.','error'); return; }

      // 데이터 복원
      if(data.users)        USERS          = data.users;
      if(data.clinics)      CLINICS        = data.clinics;
      if(data.products)     PRODUCTS       = data.products;
      if(data.fixed_costs)  FIXED_COSTS    = data.fixed_costs;
      if(data.cases)        CASES          = data.cases;
      if(data.production_log) PRODUCTION_LOG = data.production_log;

      // localStorage에 저장

window._casePhotos = [];
const MAX_PHOTOS = 5;

// 이미지 리사이즈 (최대 800px, 품질 0.82)
function resizeImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.82);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Supabase Storage에 업로드
async function uploadPhotoToStorage(caseId, file) {
  const sb = await getSupabase();
  if (!sb) return null;
  const blob = await resizeImage(file);
  const fileName = `${caseId}/ph_${Date.now()}.jpg`;
  const { data, error } = await sb.storage
    .from('case-photos')
    .upload(fileName, blob, { contentType: 'image/jpeg', upsert: false });
  if (error) { console.warn('사진 업로드 실패:', error.message); return null; }
  const { data: urlData } = sb.storage.from('case-photos').getPublicUrl(fileName);
  return { id: `ph_${Date.now()}`, name: fileName, url: urlData.publicUrl, uploaded_at: new Date().toISOString() };
}

// 파일 선택 핸들러
async function handlePhotoSelect(files) {
  const arr = Array.from(files);
  const remain = MAX_PHOTOS - window._casePhotos.length;
  if (remain <= 0) { showToast(`사진은 최대 ${MAX_PHOTOS}장까지 가능합니다.`, 'warn'); return; }
  const toAdd = arr.slice(0, remain);
  for (const file of toAdd) {
    if (!file.type.startsWith('image/')) continue;
    // 미리보기용 dataURL 생성 (업로드는 저장 시)
    const reader = new FileReader();
    reader.onload = (e) => {
      window._casePhotos.push({ id: `ph_${Date.now()}_${Math.random()}`, data: e.target.result, _file: file, url: null });
      renderPhotoPreview();
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('cm_photo_input').value = '';
}

function handlePhotoDrop(e) {
  e.preventDefault();
  document.getElementById('cm_drop_zone')?.classList.remove('drag-over');

}

function openPhotoViewer(caseId, startIdx) {
  const c = CASES.find(x => x.id === caseId);
  if (!c || !c.photos || !c.photos.length) return;
  let cur = startIdx;
  const photos = c.photos;

  const overlay = document.createElement('div');
  overlay.className = 'photo-viewer-overlay';
  overlay.id = 'photoViewerOverlay';
  overlay.innerHTML = `
    <img class="photo-viewer-img" id="pv_img" src="${photos[cur].url || photos[cur].data}" alt="">
    <div class="photo-viewer-nav">
      <button class="photo-viewer-btn" onclick="pvMove(-1)">‹ 이전</button>
      <span id="pv_count">${cur+1} / ${photos.length}</span>
      <button class="photo-viewer-btn" onclick="pvMove(1)">다음 ›</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="photo-viewer-btn" onclick="pvDownload()">⬇️ 다운로드</button>
      <button class="photo-viewer-btn" onclick="closePhotoViewer()">✕ 닫기</button>
    </div>`;
  document.body.appendChild(overlay);

  window._pvPhotos = photos;

}

function pvMove(dir) {
  const photos = window._pvPhotos;
  window._pvCur = (window._pvCur + dir + photos.length) % photos.length;
  const ph = photos[window._pvCur];
  document.getElementById('pv_img').src = ph.url || ph.data;
  document.getElementById('pv_count').textContent = `${window._pvCur+1} / ${photos.length}`;
}

// 현재 사진 다운로드
async function pvDownload() {
  const photos = window._pvPhotos;
  const ph = photos[window._pvCur];
  const src = ph.url || ph.data;
  const fileName = ph.name ? ph.name.split('/').pop() : `사진_${window._pvCur+1}.jpg`;

  // Base64 방식 (오프라인 저장 사진)
  if (ph.data && !ph.url) {
    const a = document.createElement('a');
    a.href = ph.data;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('사진이 다운로드됩니다.', 'success');
    return;
  }

  // Supabase Storage URL 방식
  if (ph.url) {
    try {
      // CORS 허용 요청
      const res = await fetch(ph.url, { mode: 'cors' });
      if (!res.ok) throw new Error('fetch 실패');
      const blob = await res.blob();
      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objectUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
      showToast('사진이 다운로드됩니다.', 'success');
    } catch(e) {
      // CORS 차단 시 — 새 탭으로 열고 안내
      const w = window.open(ph.url, '_blank');
      if (w) {
        showToast('새 탭에서 사진을 길게 눌러 저장하세요.', 'info');
      } else {
        // 팝업 차단된 경우 링크 복사
        navigator.clipboard?.writeText(ph.url).then(() => {
          showToast('사진 URL이 복사됐습니다. 브라우저에 붙여넣어 저장하세요.', 'info');
        }).catch(() => {
          showToast('사진을 길게 눌러 저장하세요.', 'info');
        });
      }
    }
  }
}

          ${currentUser.role === 'admin' ? c.clinic_name + '<br>' : ''}
          치아 #${formatToothNumbers(c.tooth_numbers || c.tooth_number)}<br>
          ${c.product_name} · <span class="badge badge-${c.status}" style="font-size:10px;">${statusLabel(c.status)}</span><br>
          <span style="color:var(--blue);">📷 ${c.photos.length}장</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 케이스 저장 시 Storage 업로드 처리 ──
async function uploadPendingPhotos(caseId) {
  const photos = window._casePhotos || [];
  const result = [];
  for (const ph of photos) {
    if (ph.url) {
      // 이미 업로드된 사진 (수정 시 유지)
      result.push({ id: ph.id, name: ph.name, url: ph.url, uploaded_at: ph.uploaded_at });
    } else if (ph._file) {
      // 새로 추가된 사진 → Storage 업로드
      if (isSupabaseConnected) {
        const uploaded = await uploadPhotoToStorage(caseId, ph._file);
        if (uploaded) result.push(uploaded);
        else result.push({ id: ph.id, data: ph.data, uploaded_at: new Date().toISOString() });
      } else {
        // 오프라인: Base64로 저장
        result.push({ id: ph.id, data: ph.data, uploaded_at: new Date().toISOString() });
      }
    }
  }
  return result;
}

function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  const icons={success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span>${icons[type]||'✅'}</span><span style="flex:1;">${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .3s ease forwards';setTimeout(()=>t.remove(),300);},3000);
}
